<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Portal — Property Management</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <script>(function(){const t=localStorage.getItem('pma_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    @media print {
      .sidebar,.topbar,.sidebar-overlay,.toast-container,.modal-overlay,
      .rpt-controls-area,.rpt-tab-bar,.rpt-print-btn { display:none !important; }
      body,.dash-wrap,.main-content,.page-content { all:unset; display:block !important; }
      .table-card { box-shadow:none !important; border:1px solid #ccc; }
      .data-table th,.data-table td { font-size:.8rem; }
    }
  </style>
</head>
<body>
<div class="dash-wrap">
  <aside class="sidebar sidebar-agency">
    <div class="sidebar-brand">
      <div class="app-name">Property Management</div>
      <div class="role-name"><i class="fa-solid fa-city"></i> Agency Portal</div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">A</div>
      <div>
        <div class="user-name"  id="sb-name">Agency</div>
        <div class="user-role" id="sb-code">—</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <ul style="padding:0;margin:0;">
        <li class="nav-item"><button class="nav-link-btn active" data-view="dashboard"    onclick="showView('dashboard',this)"><i class="fa-solid fa-gauge"></i> Dashboard</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="clients"      onclick="showView('clients',this)"><i class="fa-solid fa-user-tie"></i> Clients</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="properties"   onclick="showView('properties',this)"><i class="fa-solid fa-building"></i> Properties</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="units"        onclick="showView('units',this)"><i class="fa-solid fa-door-open"></i> Units</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="tenants"      onclick="showView('tenants',this)"><i class="fa-solid fa-users"></i> Tenants</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="transactions" onclick="showView('transactions',this)"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="profile"      onclick="showView('profile',this)"><i class="fa-solid fa-circle-user"></i> My Profile</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="reports"     onclick="showView('reports',this)"><i class="fa-solid fa-print"></i> Print Reports</button></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <h2 id="page-title">Dashboard</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle dark / light mode"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
    </div>
    <div class="page-content" id="view-container"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="toast-container" id="toast-container"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-hdr bg-agency" id="modal-hdr">
      <h5 id="modal-title">Form</h5>
      <button class="btn-close-modal" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body-pad" id="modal-body"></div>
    <div class="modal-footer-pad" id="modal-footer"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/api.js"></script>
<script>
  DB.init();

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('pma_theme', next);
    document.getElementById('theme-icon').className = next === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  (function(){ const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; const i = document.getElementById('theme-icon'); if(i) i.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon'; })();

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  document.querySelectorAll('.nav-link-btn').forEach(btn => {
    btn.addEventListener('click', () => { if (window.innerWidth <= 768) toggleSidebar(); });
  });

  const sess = JSON.parse(sessionStorage.getItem('pma_session') || 'null');
  if (!sess || sess.role !== 'agency') { window.location.href = 'index.html'; }

  let agency = DB.findOne('agencies', { AgencyCode: sess.id });
  if (!agency) { window.location.href = 'index.html'; }

  document.getElementById('sb-avatar').textContent = agency.AgencyName[0].toUpperCase();
  document.getElementById('sb-name').textContent   = agency.AgencyName;
  document.getElementById('sb-code').textContent   = agency.AgencyCode;

  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  const AC = agency.AgencyCode;
  function myClients()  { return DB.find('clients',     { AgencyCode: AC }); }
  function myProps()    { return DB.find('properties',  { AgencyCode: AC }); }
  function myUnits()    { const codes = myProps().map(p=>p.PropertyCode); return DB.getAll('propunits').filter(u=>codes.includes(u.PropertyCode)); }
  function myTenants()  { const codes = myProps().map(p=>p.PropertyCode); return DB.getAll('tenants').filter(t=>codes.includes(t.PropertyCode)); }
  function myTxs() {
    const ids=myTenants().map(t=>t.TenantID);
    return DB.getAll('transactions').filter(t=>ids.includes(t.TenantID)).sort((a,b)=>{
      const ta=DB.findOne('tenants',{TenantID:a.TenantID})||{}, tb=DB.findOne('tenants',{TenantID:b.TenantID})||{};
      const na=(ta.FirstName||'')+' '+(ta.LastName||''), nb=(tb.FirstName||'')+' '+(tb.LastName||'');
      return na!==nb ? na.localeCompare(nb) : new Date(b.Date)-new Date(a.Date);
    });
  }

  function fmtDate(d)  { return d ? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—'; }
  function fmtMoney(n) { const abs=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2}); return (n<0?'-':'')+'$'+abs; }

  function showView(view, btn) {
    document.querySelectorAll('.nav-link-btn').forEach(b=>b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const titles = { dashboard:'Dashboard', clients:'Clients', properties:'Properties', units:'Units', tenants:'Tenants', transactions:'Transactions', profile:'My Profile', reports:'Print Reports' };
    document.getElementById('page-title').textContent = titles[view] || view;
    const ta = document.getElementById('topbar-actions');
    ta.innerHTML = '';
    const c = document.getElementById('view-container');
    if      (view==='dashboard')    { c.innerHTML = renderDashboard(); }
    else if (view==='clients')      { c.innerHTML = renderClients();      ta.innerHTML=`<button class="btn-primary-custom bg-agency" onclick="openAddClient()"><i class="fa-solid fa-plus"></i> Add Client</button>`; }
    else if (view==='properties')   { c.innerHTML = renderProperties();   ta.innerHTML=`<button class="btn-primary-custom bg-agency" onclick="openAddProperty()"><i class="fa-solid fa-plus"></i> Add Property</button>`; }
    else if (view==='units')        { c.innerHTML = renderUnits();        ta.innerHTML=`<button class="btn-primary-custom bg-agency" onclick="openAddUnit()"><i class="fa-solid fa-plus"></i> Add Unit</button> <button class="btn-primary-custom bg-agency" onclick="openUnitsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Units Upload</button>`; }
    else if (view==='tenants')      { c.innerHTML = renderTenants();      ta.innerHTML=`<button class="btn-primary-custom bg-agency" onclick="openAddTenant()"><i class="fa-solid fa-plus"></i> Add Tenant</button> <button class="btn-primary-custom bg-agency" onclick="openTenantsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Tenants Upload</button>`; }
    else if (view==='transactions') { c.innerHTML = renderTransactions(); ta.innerHTML=`<button class="btn-primary-custom bg-agency" onclick="openPostTx()"><i class="fa-solid fa-plus"></i> Post Transaction</button> <button class="btn-primary-custom bg-agency" onclick="openBulkPostTx()" style="margin-left:8px"><i class="fa-solid fa-layer-group"></i> Bulk Post</button>`; }
    else if (view==='profile')      { c.innerHTML = renderProfile(); }
    else if (view==='reports')      { c.innerHTML = renderReports(); }
  }

  function renderDashboard() {
    const cl=myClients(), pr=myProps(), un=myUnits(), te=myTenants(), tx=myTxs();
    const occupied=un.filter(u=>u.UnitStatus==='Occupied').length;
    const balance=tx.reduce((s,t)=>s+Number(t.Amount),0);
    return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#7209b7,#480088)"><i class="fa-solid fa-user-tie"></i></div><div class="stat-info"><div class="stat-val">${cl.length}</div><div class="stat-lbl">Clients</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#2d9b59,#1a6b3c)"><i class="fa-solid fa-building"></i></div><div class="stat-info"><div class="stat-val">${pr.length}</div><div class="stat-lbl">Properties</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#4361ee,#3a0ca3)"><i class="fa-solid fa-door-open"></i></div><div class="stat-info"><div class="stat-val">${occupied}/${un.length}</div><div class="stat-lbl">Occupied Units</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#d62828,#9b0000)"><i class="fa-solid fa-users"></i></div><div class="stat-info"><div class="stat-val">${te.filter(t=>t.Active==='Y').length}</div><div class="stat-lbl">Active Tenants</div></div></div>
    </div>
    <div class="dash-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="table-card">
        <div class="table-card-header"><h5>Clients Overview</h5></div>
        <div class="table-responsive"><table class="data-table">
          <thead><tr><th>Code</th><th>Name</th><th>Properties</th><th>Active</th></tr></thead>
          <tbody>${cl.map(c=>{const cp=DB.find('properties',{ClientCode:c.ClientCode});return`<tr><td style="font-family:monospace">${c.ClientCode}</td><td>${c.ClientName}</td><td>${cp.length}</td><td><span class="badge-${c.Active==='Y'?'active':'inactive'}">${c.Active==='Y'?'Active':'Inactive'}</span></td></tr>`}).join('')||'<tr><td colspan="4" style="text-align:center;padding:20px;color:#aaa">No clients.</td></tr>'}</tbody>
        </table></div>
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <h5>Recent Transactions</h5>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <select id="dash-client-filter" class="form-control-sm2" style="width:auto;min-width:130px;" onchange="filterDashTx()">
              <option value="">All Clients</option>
              ${cl.map(c=>`<option value="${c.ClientCode}">${c.ClientName}</option>`).join('')}
            </select>
            <select id="dash-prop-filter" class="form-control-sm2" style="width:auto;min-width:140px;" onchange="filterDashTx()">
              <option value="">All Properties</option>
              ${pr.map(p=>`<option value="${p.PropertyCode}">${p.PropertyName}</option>`).join('')}
            </select>
            <span style="font-size:.85rem;white-space:nowrap;">Total: <strong id="dash-bal-val" style="color:${balance>=0?'#2d9b59':'#d62828'}">${fmtMoney(balance)}</strong></span>
          </div>
        </div>
        <div class="table-responsive"><table class="data-table">
          <thead><tr><th>Date</th><th>Tenant</th><th>Amount</th><th>Auth</th></tr></thead>
          <tbody id="dash-tx-tbody">${tx.slice(0,8).map(t=>{const ten=DB.findOne('tenants',{TenantID:t.TenantID})||{};return`<tr><td>${fmtDate(t.Date)}</td><td>${ten.FirstName||''} ${ten.LastName||''}</td><td style="font-weight:600;color:${Number(t.Amount)>=0?'#2d9b59':'#d62828'}">${fmtMoney(t.Amount)}</td><td><span class="badge-${t.Authenticated==='Y'?'active':'inactive'}">${t.Authenticated==='Y'?'✓':'Pend'}</span></td></tr>`}).join('')||'<tr><td colspan="4" style="text-align:center;padding:20px;color:#aaa">None.</td></tr>'}</tbody>
        </table></div>
      </div>
    </div>`;
  }

  function filterDashTx() {
    const clientCode = document.getElementById('dash-client-filter').value;
    const propSel    = document.getElementById('dash-prop-filter');
    const prevProp   = propSel.value;
    const filteredProps = clientCode ? myProps().filter(p=>p.ClientCode===clientCode) : myProps();
    propSel.innerHTML = '<option value="">All Properties</option>' +
      filteredProps.map(p=>`<option value="${p.PropertyCode}" ${p.PropertyCode===prevProp?'selected':''}>${p.PropertyName}</option>`).join('');
    const propCode = propSel.value;
    let filtered = myTxs();
    if (clientCode) {
      const cpCodes = myProps().filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode);
      filtered = filtered.filter(tx=>cpCodes.includes(tx.PropertyCode));
    }
    if (propCode) filtered = filtered.filter(tx=>tx.PropertyCode===propCode);
    const bal   = filtered.reduce((s,t)=>s+Number(t.Amount),0);
    const balEl = document.getElementById('dash-bal-val');
    if (balEl) { balEl.textContent=fmtMoney(bal); balEl.style.color=bal>=0?'#2d9b59':'#d62828'; }
    const tbody = document.getElementById('dash-tx-tbody');
    if (!tbody) return;
    tbody.innerHTML = filtered.slice(0,8).map(t=>{
      const ten=DB.findOne('tenants',{TenantID:t.TenantID})||{};
      return`<tr><td>${fmtDate(t.Date)}</td><td>${ten.FirstName||''} ${ten.LastName||''}</td><td style="font-weight:600;color:${Number(t.Amount)>=0?'#2d9b59':'#d62828'}">${fmtMoney(t.Amount)}</td><td><span class="badge-${t.Authenticated==='Y'?'active':'inactive'}">${t.Authenticated==='Y'?'✓':'Pend'}</span></td></tr>`;
    }).join('')||'<tr><td colspan="4" style="text-align:center;padding:20px;color:#aaa">None.</td></tr>';
  }

  function renderClients() {
    const cls=myClients();
    return `<div class="table-card"><div class="table-card-header"><h5>Clients (${cls.length})</h5></div>
    <div class="table-responsive"><table class="data-table">
      <thead><tr><th>Code</th><th>Name</th><th>Contact</th><th>Email</th><th>Since</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${cls.map(c=>{
        const clientTenantIds=DB.getAll('tenants').filter(t=>DB.getAll('properties').filter(p=>p.ClientCode===c.ClientCode).map(p=>p.PropertyCode).includes(t.PropertyCode)).map(t=>t.TenantID);
        const hasTxs=DB.getAll('transactions').some(tx=>clientTenantIds.includes(tx.TenantID));
        const canDel=c.Active!=='Y'&&!hasTxs;
        const delTitle=c.Active==='Y'?'Client is active':hasTxs?'Client has transactions':'Delete client';
        return `<tr>
          <td style="font-family:monospace">${c.ClientCode}</td>
          <td><strong>${c.ClientName}</strong><br><span class="text-muted-sm">${c.Address}</span></td>
          <td>${c.Telephone}</td><td>${c.Email}</td>
          <td>${fmtDate(c.Date)}</td>
          <td><span class="badge-${c.Active==='Y'?'active':'inactive'}">${c.Active==='Y'?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditClient('${c.ClientCode}')"><i class="fa-solid fa-pen"></i></button>
            ${canDel
              ?`<button class="btn-del" onclick="deleteClient('${c.ClientCode}')"><i class="fa-solid fa-trash"></i></button>`
              :`<button class="btn-del" disabled title="${delTitle}" style="opacity:.35;cursor:not-allowed"><i class="fa-solid fa-trash"></i></button>`}
          </td>
        </tr>`;
      }).join('')||'<tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa">No clients.</td></tr>'}</tbody>
    </table></div></div>`;
  }

  function deleteClient(code) {
    const c=DB.findOne('clients',{ClientCode:code});
    if(!c)return;
    if(c.Active==='Y'){toast('Cannot delete an active client.','error');return;}
    const tenIds=DB.getAll('tenants').filter(t=>DB.getAll('properties').filter(p=>p.ClientCode===code).map(p=>p.PropertyCode).includes(t.PropertyCode)).map(t=>t.TenantID);
    if(DB.getAll('transactions').some(tx=>tenIds.includes(tx.TenantID))){toast('Cannot delete: client has transactions.','error');return;}
    if(!confirm('Delete client '+code+'? This cannot be undone.'))return;
    DB.remove('clients','ClientCode',code);
    showView('clients',document.querySelector('[data-view="clients"]'));
    toast('Client '+code+' deleted.','success');
  }

  function renderProperties() {
    const props=myProps();
    return `<div class="table-card"><div class="table-card-header"><h5>Properties (${props.length})</h5></div>
    <div class="table-responsive"><table class="data-table">
      <thead><tr><th>Code</th><th>Name</th><th>Client</th><th>City</th><th>Type</th><th>Manager</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${props.map(p=>{
        const cl=DB.findOne('clients',{ClientCode:p.ClientCode})||{};
        const propTenantIds=DB.getAll('tenants').filter(t=>t.PropertyCode===p.PropertyCode).map(t=>t.TenantID);
        const hasTxs=DB.getAll('transactions').some(tx=>propTenantIds.includes(tx.TenantID));
        const clientInactive=cl.Active!=='Y';
        const canDel=clientInactive&&!hasTxs;
        const delTitle=!clientInactive?'Client is active':hasTxs?'Property has transactions':'Delete property';
        return`<tr>
          <td style="font-family:monospace">${p.PropertyCode}</td>
          <td><strong>${p.PropertyName}</strong></td>
          <td>${cl.ClientName||p.ClientCode}</td>
          <td>${p.City}</td><td>${p.PropertyType}</td>
          <td>${p.Manager}</td>
          <td><span class="badge-${p.Active==='Y'?'active':'inactive'}">${p.Active==='Y'?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditProperty('${p.PropertyCode}')"><i class="fa-solid fa-pen"></i></button>
            ${canDel
              ?`<button class="btn-del" onclick="deleteProperty('${p.PropertyCode}')"><i class="fa-solid fa-trash"></i></button>`
              :`<button class="btn-del" disabled title="${delTitle}" style="opacity:.35;cursor:not-allowed"><i class="fa-solid fa-trash"></i></button>`}
          </td>
        </tr>`;
      }).join('')||'<tr><td colspan="8" style="text-align:center;padding:40px;color:#aaa">No properties.</td></tr>'}</tbody>
    </table></div></div>`;
  }

  function deleteProperty(code) {
    if(!confirm('Delete property '+code+'? This cannot be undone.'))return;
    DB.remove('properties','PropertyCode',code);
    showView('properties',document.querySelector('[data-view="properties"]'));
    toast('Property '+code+' deleted.','success');
  }

  function renderUnits() {
    const units=myUnits();
    return `<div class="table-card"><div class="table-card-header"><h5>Units (${units.length})</h5></div>
    <div class="table-responsive"><table class="data-table">
      <thead><tr><th>Unit Code</th><th>Property</th><th>Unit#</th><th>Bed/Bath</th><th>Floor</th><th>Rent</th><th>Deposit</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${units.map(u=>{
        const p=DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
        const unitTenantIds=DB.getAll('tenants').filter(t=>t.UnitCode===u.UnitCode).map(t=>t.TenantID);
        const hasTxs=DB.getAll('transactions').some(tx=>unitTenantIds.includes(tx.TenantID));
        const canDel=u.UnitStatus==='Vacant'&&!hasTxs;
        const delTitle=u.UnitStatus!=='Vacant'?'Unit is occupied':hasTxs?'Unit has transactions':'Delete unit';
        return`<tr>
          <td style="font-family:monospace">${u.UnitCode}</td>
          <td>${p.PropertyName||u.PropertyCode}</td>
          <td><strong>${u.UnitNumber}</strong></td>
          <td>${u.Bedrooms}BR/${u.Bathrooms}BA</td><td>${u.Floor}</td>
          <td>$${Number(u.RentAmount).toLocaleString()}</td>
          <td>$${Number(u.DepositAmount).toLocaleString()}</td>
          <td><span class="${u.UnitStatus==='Occupied'?'badge-occupied':'badge-vacant'}">${u.UnitStatus}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditUnit('${u.UnitCode}')"><i class="fa-solid fa-pen"></i></button>
            ${canDel
              ?`<button class="btn-del" onclick="deleteUnit('${u.UnitCode}')"><i class="fa-solid fa-trash"></i></button>`
              :`<button class="btn-del" disabled title="${delTitle}" style="opacity:.35;cursor:not-allowed"><i class="fa-solid fa-trash"></i></button>`}
          </td>
        </tr>`;
      }).join('')||'<tr><td colspan="9" style="text-align:center;padding:40px;color:#aaa">No units.</td></tr>'}</tbody>
    </table></div></div>`;
  }

  function deleteUnit(code) {
    if(!confirm('Delete unit '+code+'? This cannot be undone.'))return;
    DB.remove('propunits','UnitCode',code);
    showView('units',document.querySelector('[data-view="units"]'));
    toast('Unit '+code+' deleted.','success');
  }

  function renderTenants() {
    const tenants=myTenants().slice().sort((a,b)=>{
      const pa=DB.findOne('properties',{PropertyCode:a.PropertyCode})||{}, pb=DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const ua=DB.findOne('propunits',{UnitCode:a.UnitCode})||{}, ub=DB.findOne('propunits',{UnitCode:b.UnitCode})||{};
      const ka=(pa.PropertyName||'')+' '+(ua.UnitNumber||''), kb=(pb.PropertyName||'')+' '+(ub.UnitNumber||'');
      return ka.localeCompare(kb);
    });
    return `<div class="table-card"><div class="table-card-header"><h5>Tenants (${tenants.length})</h5></div>
    <div class="table-responsive"><table class="data-table">
      <thead><tr><th>Tenant#</th><th>Name</th><th>Property/Unit</th><th>Telephone</th><th>Rent</th><th>Move-in</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${tenants.map(t=>{
        const p=DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
        const u=DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
        const hasTxs=DB.getAll('transactions').some(tx=>tx.TenantID===t.TenantID);
        const canDel=t.Active!=='Y'&&!hasTxs;
        const delTitle=t.Active==='Y'?'Tenant is active':hasTxs?'Tenant has transactions':'Delete tenant';
        return`<tr>
          <td style="font-size:.78rem;font-family:monospace">${t.TenantNumber}</td>

    DB.remove('tenants','TenantID',id);

  function downloadUnitTemplate() {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded yet. Try again in a moment.','error'); return; }
    const ws = XLSX.utils.aoa_to_sheet([
      ['PropertyCode','UnitNumber','RentAmount','DepositAmount','Bedrooms','Bathrooms','Floor','UnitStatus'],
      ['PR001','101','1200.00','2400.00','2','1','1','Vacant'],
      ['PR001','102','1100.00','2200.00','1','1','2','Vacant']
    ]);
    ws['!cols'] = [{wch:14},{wch:12},{wch:12},{wch:14},{wch:10},{wch:10},{wch:8},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Units');
    XLSX.writeFile(wb, 'Unit_Upload_Template.xlsx');

  function previewUnitsUpload() {
    const file = document.getElementById('uu-file').files[0];
    if (!file) return;
    document.getElementById('uu-preview').innerHTML = '<div style="padding:10px;font-size:.84rem;color:#888"><i class="fa-solid fa-spinner fa-spin"></i> Reading file…</div>';
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:'', raw:false});
        window._unitUploadRows = rows;
        renderUnitsPreview(rows);
      } catch(err) {
        document.getElementById('uu-preview').innerHTML = `<div style="color:#d62828;padding:10px;font-size:.85rem"><i class="fa-solid fa-triangle-exclamation"></i> Error reading file: ${err.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function renderUnitsPreview(rows) {
    const myPropCodes = myProps().map(p => p.PropertyCode);
    const seenInBatch = {};
    let validCount = 0;

    const rowData = rows.map((row, i) => {
      const errors = [];
      const propCode = String(row.PropertyCode || '').trim();
      const unitNum  = String(row.UnitNumber  || '').trim();

      if (!propCode) errors.push('PropertyCode required');
      else if (!myPropCodes.includes(propCode)) errors.push('PropertyCode not in your agency');

      if (!unitNum) errors.push('UnitNumber required');
      else if (propCode && myPropCodes.includes(propCode)) {
        if (DB.find('propunits',{PropertyCode:propCode}).some(u => String(u.UnitNumber) === unitNum))
          errors.push('Unit already exists');
        const bk = propCode+'|'+unitNum;
        if (seenInBatch[bk]) errors.push('Duplicate in file');
        else seenInBatch[bk] = true;
      }

      if (row.RentAmount    === '' || isNaN(Number(row.RentAmount)))    errors.push('Invalid RentAmount');
      if (row.DepositAmount === '' || isNaN(Number(row.DepositAmount))) errors.push('Invalid DepositAmount');
      if (row.Bedrooms      === '' || isNaN(Number(row.Bedrooms)))      errors.push('Invalid Bedrooms');
      if (row.Bathrooms     === '' || isNaN(Number(row.Bathrooms)))     errors.push('Invalid Bathrooms');
      if (row.Floor         === '' || isNaN(Number(row.Floor)))         errors.push('Invalid Floor');

      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, propCode, unitNum, valid, errors};
    });

    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) found &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length - validCount} with errors</strong></div>`;

        <td>${i+1}</td>

        <td>${unitNum}</td>

      ['John','Doe','ID123456','555-0100','john.doe@email.com','123 Main St','PR001','101','1200.00','2400.00','Monthly','2026-04-01'],
      ['Jane','Smith','ID789012','555-0200','jane.smith@email.com','456 Oak Ave','PR001','102','1100.00','2200.00','Monthly','2026-04-01']

    ws['!cols'] = [{wch:12},{wch:12},{wch:12},{wch:13},{wch:22},{wch:22},{wch:14},{wch:12},{wch:12},{wch:13},{wch:14},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Tenants');
    const notesWs = XLSX.utils.aoa_to_sheet([
      ['Field','Allowed Values / Notes'],
      ['FirstName','Text — required'],
      ['LastName','Text — required'],
      ['IDNumber','Text — required'],
      ['Telephone','Text — required'],
      ['Email','Valid email — required'],
      ['Address','Text — required'],
      ['PropertyCode','Must match an existing Property Code in your agency'],
      ['UnitNumber','Must match an existing Unit Number within the specified property'],
      ['RentAmount','Number (e.g. 1200.00) — required'],

  function normalizeUploadDate(val) {
    const s = String(val||'').trim();
    if (!s) return '';
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
    return s;
  }

  function renderTenantsPreview(rows) {
    const myPropCodes = myProps().map(p => p.PropertyCode);
    const VALID_FREQ  = ['Monthly','Quarterly','SemiAnnually','Annually'];
    let validCount = 0;

    const rowData = rows.map((row, i) => {
      const errors = [];
      const propCode = String(row.PropertyCode || '').trim();
      const unitNum  = String(row.UnitNumber  || '').trim();

      if (!String(row.FirstName||'').trim()) errors.push('FirstName required');
      if (!String(row.LastName||'').trim())  errors.push('LastName required');
      if (!String(row.IDNumber||'').trim())  errors.push('IDNumber required');
      if (!String(row.Telephone||'').trim()) errors.push('Telephone required');
      if (!String(row.Email||'').trim())     errors.push('Email required');
      if (!String(row.Address||'').trim())   errors.push('Address required');

      if (!propCode) errors.push('PropertyCode required');
      else if (!myPropCodes.includes(propCode)) errors.push('PropertyCode not in your agency');

      let resolvedUnitCode = '';
      if (!unitNum) { errors.push('UnitNumber required'); }
      else if (propCode && myPropCodes.includes(propCode)) {
        const unit = DB.find('propunits',{PropertyCode:propCode}).find(u => String(u.UnitNumber) === unitNum);
        if (!unit) errors.push(`Unit ${unitNum} not found in ${propCode}`);
        else resolvedUnitCode = unit.UnitCode;
      }

      if (row.RentAmount    === '' || isNaN(Number(row.RentAmount)))    errors.push('Invalid RentAmount');
      if (row.DepositAmount === '' || isNaN(Number(row.DepositAmount))) errors.push('Invalid DepositAmount');

      const freq = String(row.RentFrequency||'').trim();
      if (!freq) errors.push('RentFrequency required');
      else if (!VALID_FREQ.includes(freq)) errors.push(`RentFrequency must be: ${VALID_FREQ.join(' | ')}`);

      const normDate = normalizeUploadDate(row.MoveInDate);
      if (!normDate) errors.push('MoveInDate required');
      else if (isNaN(Date.parse(normDate))) errors.push('Invalid MoveInDate (use YYYY-MM-DD)');

      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, i, propCode, unitNum, resolvedUnitCode, normDate, valid, errors};
    });

    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) found &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length - validCount} with errors</strong></div>`;
    html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:.76rem">
      <thead><tr><th>#</th><th>Name</th><th>ID Number</th><th>Email</th><th>PropertyCode</th><th>Unit</th><th>Rent</th><th>Freq</th><th>Move-in</th><th>Validation</th></tr></thead><tbody>`;

    rowData.forEach(({row, i, propCode, unitNum, normDate, valid, errors}) => {
      html += `<tr style="background:${valid ? '' : '#fff5f5'}">
        <td>${i+1}</td>
        <td><strong>${String(row.FirstName||'')} ${String(row.LastName||'')}</strong></td>
        <td style="font-family:monospace;font-size:.74rem">${row.IDNumber||''}</td>
        <td style="font-size:.74rem">${row.Email||''}</td>
        <td style="font-family:monospace">${propCode}</td>
        <td>${unitNum}</td>
        <td>${row.RentAmount||''}</td>
        <td>${row.RentFrequency||''}</td>
        <td>${normDate||row.MoveInDate||''}</td>
        <td style="color:${valid?'#2d9b59':'#d62828'};font-size:.78rem;min-width:140px">${valid ? '<i class="fa-solid fa-check"></i> OK' : errors.join('; ')}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
    if (rows.length - validCount > 0)
      html += `<div style="font-size:.78rem;color:#888;margin-top:6px"><i class="fa-solid fa-circle-info"></i> Only valid rows will be imported. Photographs, ID copies and agreements can be attached individually via Edit Tenant.</div>`;

    document.getElementById('tu-preview').innerHTML = html;
    const btn = document.getElementById('tu-save-btn');
    if (btn) { btn.style.display = validCount > 0 ? '' : 'none'; btn.innerHTML = `<i class="fa-solid fa-upload"></i> Import ${validCount} Tenant(s)`; }
    window._tenantUploadRowData = rowData;
  }

  function savePostTx() {
    const propCode=document.getElementById('pt-prop').value;
    const tenId=document.getElementById('pt-tenant').value;
    const desc=document.getElementById('pt-desc').value.trim();
    const amt=parseFloat(document.getElementById('pt-amt').value);

    const docInput=document.getElementById('pt-doc');
    if(!propCode){toast('Property is required.','error');return;}
    if(!tenId){toast('Tenant is required.','error');return;}
    if(!desc){toast('Description is required.','error');return;}
    if(isNaN(amt)){toast('Amount is required.','error');return;}
    if(!docInput.files[0]){toast('Document upload is required.','error');return;}
    const prop=DB.findOne('properties',{PropertyCode:propCode})||{};
    const reader=new FileReader();
    reader.onload=e=>{
      const ref=DB.nextTxRef();
      DB.insert('transactions',{
        Date:document.getElementById('pt-date').value,
        TenantID:tenId, Authenticated:'N',
        PropertyCode:propCode,
        Description:desc, Amount:amt,
        Currency:prop.Currency||'USD',
        TransactionNote:note, TransactionDocument:e.target.result,
        transactionRef:ref, UpdateUser:agency.UserName
      });
      closeModal(); showView('transactions',document.querySelector('[data-view="transactions"]'));
      toast('Transaction '+ref+' posted!','success');
    };
    reader.readAsDataURL(docInput.files[0]);
  }

  function toggleBulkAmtField() {
    const isCustom = document.getElementById('bp-chargetype').value === 'custom';
    document.getElementById('bp-amt-group').style.display = isCustom ? '' : 'none';
  }

  function bulkSelectAll(checked) {
    document.querySelectorAll('.bp-tenant-cb').forEach(cb => cb.checked = checked);

  function saveBulkPostTx() {
    const propCode = document.getElementById('bp-prop').value;
    const date = document.getElementById('bp-date').value;
    const chargeType = document.getElementById('bp-chargetype').value;
    const desc = document.getElementById('bp-desc').value.trim();
    const note = document.getElementById('bp-note').value.trim();
    const docInput = document.getElementById('bp-doc');
    const customAmt = parseFloat(document.getElementById('bp-amt') ? document.getElementById('bp-amt').value : 'NaN');

    if (!propCode) { toast('Property is required.','error'); return; }
    if (!date) { toast('Date is required.','error'); return; }
    if (!desc) { toast('Description is required.','error'); return; }
    if (chargeType === 'custom' && isNaN(customAmt)) { toast('Amount is required for custom charge.','error'); return; }
    if (!docInput.files[0]) { toast('Document upload is required.','error'); return; }

    const selected = Array.from(document.querySelectorAll('.bp-tenant-cb:checked')).map(cb=>cb.value);
    if (!selected.length) { toast('Select at least one tenant.','error'); return; }

    const prop = DB.findOne('properties',{PropertyCode:propCode})||{};
    const currency = prop.Currency||'USD';

    const reader = new FileReader();
    reader.onload = e => {
      const docData = e.target.result;
      let count = 0;
      selected.forEach(tenId => {
        const tenant = DB.findOne('tenants',{TenantID:tenId});
        if (!tenant) return;
        const amount = chargeType === 'rent' ? Number(tenant.RentAmount) : customAmt;
        const ref = DB.nextTxRef();
        DB.insert('transactions',{
          Date: date,
          TenantID: tenId,
          Authenticated: 'N',
          PropertyCode: propCode,
          Description: desc,
          Amount: amount,
          Currency: currency,
          TransactionNote: note,
          TransactionDocument: docData,
          transactionRef: ref,
          UpdateUser: agency.UserName
        });
        count++;
      });
      closeModal();
      showView('transactions', document.querySelector('[data-view="transactions"]'));
      toast(`Bulk post complete — ${count} transaction${count!==1?'s':''} posted!`, 'success');
    };
    reader.readAsDataURL(docInput.files[0]);
  }

  function saveProfile(e) {
    e.preventDefault();
    const a = DB.findOne('agencies', { AgencyCode: AC });
    if (!a) { toast('Agency not found.', 'error'); return; }

    const name    = document.getElementById('prof-name').value.trim();
    const email   = document.getElementById('prof-email').value.trim();
    const tel     = document.getElementById('prof-tel').value.trim();
    const address = document.getElementById('prof-address').value.trim();
    const newPwd  = document.getElementById('prof-new-pwd').value;
    const confPwd = document.getElementById('prof-conf-pwd').value;

    if (!name || !email) { toast('Name and email are required.', 'error'); return; }

    const updates = { AgencyName: name, Email: email, Telephone: tel, Address: address };

    if (newPwd || confPwd) {
      if (newPwd.length < 6) { toast('New password must be at least 6 characters.', 'error'); return; }
      if (newPwd !== confPwd) { toast('New passwords do not match.', 'error'); return; }
      updates.Password = newPwd;
      updates.password = newPwd;
    }

    DB.update('agencies', 'AgencyCode', AC, updates);
    agency = DB.findOne('agencies', { AgencyCode: AC });
    document.getElementById('sb-name').textContent = agency.AgencyName;
    document.getElementById('sb-avatar').textContent = agency.AgencyName[0].toUpperCase();

    document.getElementById('prof-new-pwd').value = '';
    document.getElementById('prof-conf-pwd').value = '';

    toast('Profile updated successfully.', 'success');
  }

    const clientCode = document.getElementById('rpt-tlist-client').value;
    const propSel    = document.getElementById('rpt-tlist-prop');
    const filtered   = clientCode ? myProps().filter(p=>p.ClientCode===clientCode) : myProps();
    propSel.innerHTML = '<option value="">All Properties</option>' +
      filtered.map(p=>`<option value="${p.PropertyCode}">${p.PropertyName} (${p.PropertyCode})</option>`).join('');
  }

  function _txTableRows(txs) {
    let runBal = 0;
    return txs.map(tx => {
      runBal += Number(tx.Amount);
      const ten = DB.findOne('tenants',{TenantID:tx.TenantID})||{};
      const p   = DB.findOne('properties',{PropertyCode:tx.PropertyCode})||{};
      const cr  = Number(tx.Amount) >= 0;
      return `<tr>
        <td>${fmtDate(tx.Date)}</td>
        <td>${ten.FirstName||''} ${ten.LastName||''}</td>
        <td>${p.PropertyName||tx.PropertyCode}</td>
        <td>${tx.Description}</td>
        <td style="font-family:monospace;font-size:.78rem">${tx.transactionRef}</td>
        <td style="text-align:right;color:#d62828">${!cr?fmtMoney(Math.abs(Number(tx.Amount))):'—'}</td>
        <td style="text-align:right;color:#1a6b3c">${cr?fmtMoney(Number(tx.Amount)):'—'}</td>
        <td style="text-align:right;font-weight:700;color:${runBal>=0?'#1a6b3c':'#d62828'}">${fmtMoney(runBal)}</td>
        <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'Verified':'Pending'}</span></td>
      </tr>`;
    });
  }

  function _txTable(txs, closingBal) {
    const rows = _txTableRows(txs);
    return `<div class="table-responsive"><table class="data-table">
      <thead><tr><th>Date</th><th>Tenant</th><th>Property</th><th>Description</th><th>Reference</th>
        <th style="text-align:right">Debit</th><th style="text-align:right">Credit</th>
        <th style="text-align:right">Balance</th><th>Status</th></tr></thead>
      <tbody>${rows.join('')||'<tr><td colspan="9" style="text-align:center;padding:30px;color:#aaa">No transactions in this range.</td></tr>'}</tbody>
      <tfoot><tr style="background:#f8f9ff">
        <td colspan="7" style="text-align:right;font-weight:700;padding:12px 16px">Closing Balance:</td>
        <td style="text-align:right;font-weight:700;color:${closingBal>=0?'#1a6b3c':'#d62828'};padding:12px 16px">${fmtMoney(closingBal)}</td><td></td>
      </tr></tfoot>
    </table></div>`;
  }

  function genClientTxReport() {
    const clientCode = document.getElementById('rpt-ctxs-client').value;
    const from       = document.getElementById('rpt-ctxs-from').value;
    const to         = document.getElementById('rpt-ctxs-to').value;
    if (!clientCode) { toast('Select a client.','error'); return; }
    if (!from || !to) { toast('Enter both date range dates.','error'); return; }
    const cl   = DB.findOne('clients',{ClientCode:clientCode})||{};
    const pCodes = myProps().filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode);
    const tIds   = myTenants().filter(t=>pCodes.includes(t.PropertyCode)).map(t=>t.TenantID);
    const txs    = DB.getAll('transactions')
      .filter(tx=>tIds.includes(tx.TenantID) && tx.Date>=from && tx.Date<=to)
      .sort((a,b)=>new Date(a.Date)-new Date(b.Date));
    const closingBal = txs.reduce((s,t)=>s+Number(t.Amount),0);
    const out = document.getElementById('rpt-ctxs-out');
    out.style.display = '';
    out.innerHTML = `<div class="table-card">
      <div class="table-card-header">
        <div>
          <div style="font-weight:700;font-size:1rem">${cl.ClientName||clientCode} — Transactions</div>
          <div style="font-size:.82rem;color:#888">${fmtDate(from)} to ${fmtDate(to)} · Printed: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
        </div>
        <button class="btn-primary-custom bg-agency rpt-print-btn" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      </div>
      ${_txTable(txs, closingBal)}
    </div>`;
  }

  function genPropTxReport() {
    const propCode = document.getElementById('rpt-ptxs-prop').value;
    const from     = document.getElementById('rpt-ptxs-from').value;
    const to       = document.getElementById('rpt-ptxs-to').value;
    if (!propCode) { toast('Select a property.','error'); return; }
    if (!from || !to) { toast('Enter both date range dates.','error'); return; }
    const prop = DB.findOne('properties',{PropertyCode:propCode})||{};
    const tIds = myTenants().filter(t=>t.PropertyCode===propCode).map(t=>t.TenantID);
    const txs  = DB.getAll('transactions')
      .filter(tx=>tIds.includes(tx.TenantID) && tx.Date>=from && tx.Date<=to)
      .sort((a,b)=>new Date(a.Date)-new Date(b.Date));
    const closingBal = txs.reduce((s,t)=>s+Number(t.Amount),0);
    const out = document.getElementById('rpt-ptxs-out');
    out.style.display = '';
    out.innerHTML = `<div class="table-card">
      <div class="table-card-header">
        <div>
          <div style="font-weight:700;font-size:1rem">${prop.PropertyName||propCode} — Transactions</div>
          <div style="font-size:.82rem;color:#888">${fmtDate(from)} to ${fmtDate(to)} · Printed: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
        </div>
        <button class="btn-primary-custom bg-agency rpt-print-btn" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      </div>
      ${_txTable(txs, closingBal)}
    </div>`;
  }

  function genTenantStmtReport() {
    const selected = Array.from(document.querySelectorAll('#rpt-tstmt-tens option:checked')).map(o=>o.value);
    if (!selected.length) { toast('Select at least one tenant.','error'); return; }
    const out = document.getElementById('rpt-tstmt-out');
    out.style.display = '';
    out.innerHTML = selected.map(tid => {
      const t    = DB.findOne('tenants',{TenantID:tid});
      if (!t) return '';
      const prop = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
      const cl   = DB.findOne('clients',{ClientCode:prop.ClientCode})||{};
      const unit = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
      const txs  = DB.find('transactions',{TenantID:tid}).sort((a,b)=>new Date(a.Date)-new Date(b.Date));
      let runBal = 0;
      const rows = txs.map(tx=>{
        runBal += Number(tx.Amount);
        const cr = Number(tx.Amount)>=0;
        return `<tr>
          <td>${fmtDate(tx.Date)}</td>
          <td>${tx.Description}</td>
          <td style="font-family:monospace;font-size:.78rem">${tx.transactionRef}</td>
          <td style="text-align:right;color:#d62828">${!cr?fmtMoney(Math.abs(Number(tx.Amount))):'—'}</td>
          <td style="text-align:right;color:#1a6b3c">${cr?fmtMoney(Number(tx.Amount)):'—'}</td>
          <td style="text-align:right;font-weight:700;color:${runBal>=0?'#1a6b3c':'#d62828'}">${fmtMoney(runBal)}</td>
          <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'Verified':'Pending'}</span></td>
        </tr>`;
      }).join('');
      return `<div class="table-card" style="margin-bottom:20px;page-break-after:always;">
        <div class="table-card-header">
          <div>
            <div style="font-weight:700">${t.FirstName} ${t.LastName} <span style="font-weight:400;font-size:.85rem;color:#888">(${t.TenantNumber})</span></div>
            <div style="font-size:.82rem;color:#888">${cl.ClientName||'—'} · ${prop.PropertyName||'—'} · Unit ${unit.UnitNumber||'—'} · Rent $${Number(t.RentAmount).toLocaleString()}/${t.RentFrequency}</div>
          </div>
        </div>
        <div class="table-responsive"><table class="data-table">
          <thead><tr><th>Date</th><th>Description</th><th>Reference</th><th style="text-align:right">Debit</th><th style="text-align:right">Credit</th><th style="text-align:right">Balance</th><th>Status</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:#aaa">No transactions.</td></tr>'}</tbody>
          <tfoot><tr style="background:#f8f9ff">
            <td colspan="5" style="text-align:right;font-weight:700;padding:10px 16px">Closing Balance:</td>
            <td style="text-align:right;font-weight:700;color:${runBal>=0?'#1a6b3c':'#d62828'};padding:10px 16px">${fmtMoney(runBal)}</td><td></td>
          </tr></tfoot>
        </table></div>
      </div>`;
    }).join('') + `<div style="text-align:right;margin-top:8px;"><button class="btn-primary-custom bg-agency rpt-print-btn" onclick="window.print()"><i class="fa-solid fa-print"></i> Print All Statements</button></div>`;
  }

  function genTenantListReport() {
    const clientCode = document.getElementById('rpt-tlist-client').value;
    const propCode   = document.getElementById('rpt-tlist-prop').value;
    const statusFlt  = document.getElementById('rpt-tlist-status').value;
    let tenants = myTenants();
    if (clientCode) {
      const cPropCodes = myProps().filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode);
      tenants = tenants.filter(t=>cPropCodes.includes(t.PropertyCode));
    }
    if (propCode)  tenants = tenants.filter(t=>t.PropertyCode===propCode);
    if (statusFlt) tenants = tenants.filter(t=>t.Active===statusFlt);
    tenants.sort((a,b)=>((a.FirstName+a.LastName).localeCompare(b.FirstName+b.LastName)));
    const cl    = clientCode ? (DB.findOne('clients',{ClientCode:clientCode})||{}).ClientName||clientCode : 'All Clients';
    const pr    = propCode   ? (DB.findOne('properties',{PropertyCode:propCode})||{}).PropertyName||propCode : 'All Properties';
    const rows = tenants.map((t,i)=>{
      const prop = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
      const clt  = DB.findOne('clients',{ClientCode:prop.ClientCode})||{};
      const unit = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
      return `<tr>
        <td>${i+1}</td>
        <td style="font-family:monospace;font-size:.8rem">${t.TenantNumber}</td>
        <td><strong>${t.FirstName} ${t.LastName}</strong></td>
        <td>${t.Telephone}</td>
        <td>${t.Email}</td>
        <td>${clt.ClientName||'—'}</td>
        <td>${prop.PropertyName||'—'}</td>
        <td>Unit ${unit.UnitNumber||'—'}</td>
        <td>$${Number(t.RentAmount).toLocaleString()} / ${t.RentFrequency}</td>
        <td>${fmtDate(t.MoveInDate)}</td>
        <td><span class="badge-${t.Active==='Y'?'active':'inactive'}">${t.Active==='Y'?'Active':'Inactive'}</span></td>
      </tr>`;
    }).join('');
    const out = document.getElementById('rpt-tlist-out');
    out.style.display = '';
    out.innerHTML = `<div class="table-card">
      <div class="table-card-header">
        <div>
          <div style="font-weight:700;font-size:1rem">Tenant List — ${cl} / ${pr}</div>
          <div style="font-size:.82rem;color:#888">Printed: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})} · ${tenants.length} tenant(s)</div>
        </div>
        <button class="btn-primary-custom bg-agency rpt-print-btn" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      </div>
      <div class="table-responsive"><table class="data-table">
        <thead><tr><th>#</th><th>ID</th><th>Name</th><th>Telephone</th><th>Email</th><th>Client</th><th>Property</th><th>Unit</th><th>Rent</th><th>Move-In</th><th>Status</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="11" style="text-align:center;padding:30px;color:#aaa">No tenants found.</td></tr>'}</tbody>
      </table></div>
    </div>`;
  }

  function toast(msg,type='info') {
    const c=document.getElementById('toast-container');
    const d=document.createElement('div');
    d.className=`toast-msg toast-${type}`;d.textContent=msg;
    c.appendChild(d);setTimeout(()=>d.remove(),4000);
  }

  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  showView('dashboard', document.querySelector('[data-view="dashboard"]'));
</script>
</body>
</html>
