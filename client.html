<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — Property Management</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <script>(function(){const t=localStorage.getItem('pma_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    @media print {
      .sidebar,.topbar,.sidebar-overlay,.toast-container,.modal-overlay,
      .rpt-controls-area,.rpt-tab-bar,.rpt-print-btn { display:none !important; }
      body,.dash-wrap,.main-content,.page-content { all:unset; display:block !important; }
      .table-card { box-shadow:none !important; border:1px solid #ccc; }
      .data-table th,.data-table td { font-size:.8rem; }
    }
    .filter-bar { display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f0f0f0; }
    .filter-bar input { max-width:280px;padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:.85rem; }
    .filter-bar input:focus { outline:none;border-color:#2d9b59; }
    .unit-status-btn { padding:5px 14px;border:1px solid #ddd;border-radius:16px;cursor:pointer;font-size:.8rem;background:#f9f9f9;font-weight:600;color:#666;transition:all .15s; }
    .unit-status-btn:hover { border-color:#2d9b59;color:#2d9b59; }
    .unit-status-btn.uf-active { background:#2d9b59;color:#fff;border-color:#2d9b59; }
    .unit-group { border-bottom:1px solid #f0f0f0; }
    .unit-group:last-child { border-bottom:none; }
    .unit-group-hdr { display:flex;align-items:center;justify-content:space-between;padding:13px 20px;cursor:pointer;background:#fafafa;border-bottom:1px solid #f0f0f0;transition:background .15s;gap:12px;flex-wrap:wrap; }
    .unit-group-hdr:hover { background:#f0faf4; }
    .unit-count-pill { background:#d4edda;color:#1a6b3c;border-radius:10px;padding:2px 9px;font-size:.72rem;font-weight:700; }
    .unit-grp-body .table-responsive { margin:0; }
    .unit-grp-body .data-table { border-radius:0; }
    .tenant-group-hdr { display:flex;align-items:center;justify-content:space-between;padding:13px 20px;cursor:pointer;background:#fafafa;border-bottom:1px solid #f0f0f0;transition:background .15s;gap:12px;flex-wrap:wrap; }
    .tenant-group-hdr:hover { background:#f0faf4; }
    .tenant-count-pill { background:#d4edda;color:#1a6b3c;border-radius:10px;padding:2px 9px;font-size:.72rem;font-weight:700; }
    .tenant-grp-body .table-responsive { margin:0; }
    .tenant-grp-body .data-table { border-radius:0; }
  </style>
</head>
<body>
<div class="dash-wrap">
  <!-- Sidebar -->
  <aside class="sidebar sidebar-client">
    <div class="sidebar-brand">
      <div class="app-name">Property Management</div>
      <div class="role-name"><i class="fa-solid fa-user-tie"></i> Client Portal</div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">C</div>
      <div>
        <div class="user-name" id="sb-name">Client</div>
        <div class="user-role" id="sb-code">—</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <ul style="padding:0;margin:0;">
        <li class="nav-item"><button class="nav-link-btn active" data-view="dashboard" onclick="showView('dashboard',this)"><i class="fa-solid fa-gauge"></i> Dashboard</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="properties"   onclick="showView('properties',this)"><i class="fa-solid fa-building"></i> My Properties</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="units"        onclick="showView('units',this)"><i class="fa-solid fa-door-open"></i> Property Units</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="tenants"      onclick="showView('tenants',this)"><i class="fa-solid fa-users"></i> Tenants</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="transactions" onclick="showView('transactions',this)"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="profile"      onclick="showView('profile',this)"><i class="fa-solid fa-circle-user"></i> My Profile</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="reports"     onclick="showView('reports',this)"><i class="fa-solid fa-print"></i> Print Reports</button></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <h2 id="page-title">Dashboard</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle dark / light mode"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
    </div>
    <div class="page-content" id="view-container"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="toast-container" id="toast-container"></div>

<!-- Generic Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-hdr bg-client" id="modal-hdr">
      <h5 id="modal-title">Form</h5>
      <button class="btn-close-modal" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body-pad" id="modal-body"></div>
    <div class="modal-footer-pad" id="modal-footer"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/api.js"></script>
<script>
  DB.init();

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('pma_theme', next);
    document.getElementById('theme-icon').className = next === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  (function(){ const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; const i = document.getElementById('theme-icon'); if(i) i.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon'; })();

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  document.querySelectorAll('.nav-link-btn').forEach(btn => {
    btn.addEventListener('click', () => { if (window.innerWidth <= 768) toggleSidebar(); });
  });

  const sess = JSON.parse(sessionStorage.getItem('pma_session') || 'null');
  if (!sess || sess.role !== 'client') { window.location.href = 'index.html'; }

  let client = DB.findOne('clients', { ClientCode: sess.id });
  if (!client) { window.location.href = 'index.html'; }

  document.getElementById('sb-avatar').textContent = client.ClientName[0].toUpperCase();
  document.getElementById('sb-name').textContent   = client.ClientName;
  document.getElementById('sb-code').textContent   = client.ClientCode;

  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  function myProps()    { return DB.find('properties',   { AgencyCode: client.AgencyCode }); }
  function myCodes()    { return myProps().map(p => p.PropertyCode); }
  function myUnits()    { const codes = myCodes(); return DB.getAll('propunits').filter(u => codes.includes(u.PropertyCode)); }
  function myTenants()  { const codes = myCodes(); return DB.getAll('tenants').filter(t => codes.includes(t.PropertyCode)); }
  function myTxs() {
    const ids = myTenants().map(t=>t.TenantID);
    return DB.getAll('transactions').filter(t=>ids.includes(t.TenantID)).sort((a,b)=>{
      const ta=DB.findOne('tenants',{TenantID:a.TenantID})||{}, tb=DB.findOne('tenants',{TenantID:b.TenantID})||{};
      const na=(ta.FirstName||'')+' '+(ta.LastName||''), nb=(tb.FirstName||'')+' '+(tb.LastName||'');
      return na!==nb ? na.localeCompare(nb) : new Date(b.Date)-new Date(a.Date);
    });
  }

  function fmtDate(d)  { return d ? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—'; }
  function fmtMoney(n) { const abs = Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2}); return (n<0?'-':'')+'$'+abs; }

  function showView(view, btn) {
    document.querySelectorAll('.nav-link-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const titles = { dashboard:'Dashboard', properties:'My Properties', units:'Property Units', tenants:'Tenants', transactions:'Transactions', profile:'My Profile', reports:'Print Reports' };
    document.getElementById('page-title').textContent = titles[view] || view;
    const ta = document.getElementById('topbar-actions');
    ta.innerHTML = '';
    const c = document.getElementById('view-container');
    if (view === 'dashboard')    { c.innerHTML = renderDashboard(); }
    else if (view === 'properties') { c.innerHTML = renderProperties(); ta.innerHTML = `<button class="btn-primary-custom bg-client" onclick="openAddProperty()"><i class="fa-solid fa-plus"></i> Add Property</button>`; }
    else if (view === 'units')      { c.innerHTML = renderUnits(); buildUnitGroups(); ta.innerHTML = `<button class="btn-primary-custom bg-client" onclick="openAddUnit()"><i class="fa-solid fa-plus"></i> Add Unit</button> <button class="btn-primary-custom bg-client" onclick="openUnitsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Units Upload</button>`; }
    else if (view === 'tenants')    { c.innerHTML = renderTenants(); buildTenantGroups(); ta.innerHTML = `<button class="btn-primary-custom bg-client" onclick="openAddTenant()"><i class="fa-solid fa-plus"></i> Add Tenant</button> <button class="btn-primary-custom bg-client" onclick="openTenantsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Tenants Upload</button>`; }
    else if (view === 'transactions') { c.innerHTML = renderTransactions(); ta.innerHTML = `<button class="btn-primary-custom bg-client" onclick="openPostTx()"><i class="fa-solid fa-plus"></i> Post Transaction</button> <button class="btn-primary-custom bg-client" onclick="openBulkPostTx()" style="margin-left:8px"><i class="fa-solid fa-layer-group"></i> Bulk Posting</button>`; }
    else if (view === 'profile')      { c.innerHTML = renderProfile(); }
    else if (view === 'reports')      { c.innerHTML = renderReports(); }
  }

  function renderDashboard() {
    const props   = myProps();
    const units   = myUnits();
    const tenants = myTenants();
    const txs     = myTxs();
    const occupied = units.filter(u=>u.UnitStatus==='Occupied').length;
    const balance  = txs.reduce((s,t)=>s+Number(t.Amount),0);
    return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#2d9b59,#1a6b3c)"><i class="fa-solid fa-building"></i></div><div class="stat-info"><div class="stat-val">${props.length}</div><div class="stat-lbl">Properties</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#4361ee,#3a0ca3)"><i class="fa-solid fa-door-open"></i></div><div class="stat-info"><div class="stat-val">${units.length}</div><div class="stat-lbl">Total Units</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#7209b7,#480088)"><i class="fa-solid fa-users"></i></div><div class="stat-info"><div class="stat-val">${tenants.filter(t=>t.Active==='Y').length}</div><div class="stat-lbl">Active Tenants</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#d62828,#9b0000)"><i class="fa-solid fa-circle-check"></i></div><div class="stat-info"><div class="stat-val">${occupied}/${units.length}</div><div class="stat-lbl">Occupied Units</div></div></div>
    </div>
    <div class="table-card">
      <div class="table-card-header">
        <h5>Recent Transactions</h5>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <select id="dash-prop-filter" class="form-control-sm2" style="width:auto;min-width:160px;" onchange="filterDashTx()">
            <option value="">All Properties</option>
            ${props.map(p=>`<option value="${p.PropertyCode}">${p.PropertyName}</option>`).join('')}
          </select>
          <span style="font-size:.9rem;">Balance: <strong id="dash-bal-val" style="color:${balance>=0?'#2d9b59':'#d62828'}">${fmtMoney(balance)}</strong></span>
        </div>
      </div>
      <div class="table-responsive">
        <table class="data-table"><thead><tr><th>Date</th><th>Tenant</th><th>Description</th><th>Amount</th><th>Ref</th><th>Status</th></tr></thead>
        <tbody id="dash-tx-tbody">${txs.slice(0,10).map(tx=>{
          const ten=DB.findOne('tenants',{TenantID:tx.TenantID})||{};
          return `<tr><td>${fmtDate(tx.Date)}</td><td>${ten.FirstName||''} ${ten.LastName||''}</td><td>${tx.Description}</td>
          <td style="font-weight:600;color:${Number(tx.Amount)>=0?'#2d9b59':'#d62828'}">${Number(tx.Amount)>=0?'+':''}${fmtMoney(tx.Amount)}</td>
          <td style="font-size:.78rem;font-family:monospace">${tx.transactionRef}</td>
          <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'Verified':'Pending'}</span></td></tr>`;
        }).join('')||'<tr><td colspan="6" style="text-align:center;padding:30px;color:#aaa">No transactions yet.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  }

  function filterDashTx() {
    const propCode = document.getElementById('dash-prop-filter').value;
    const allTxs   = myTxs();
    const filtered = propCode ? allTxs.filter(tx=>tx.PropertyCode===propCode) : allTxs;
    const bal      = filtered.reduce((s,t)=>s+Number(t.Amount),0);
    const balEl    = document.getElementById('dash-bal-val');
    if (balEl) { balEl.textContent=fmtMoney(bal); balEl.style.color=bal>=0?'#2d9b59':'#d62828'; }
    const tbody = document.getElementById('dash-tx-tbody');
    if (!tbody) return;
    tbody.innerHTML = filtered.slice(0,10).map(tx=>{
      const ten=DB.findOne('tenants',{TenantID:tx.TenantID})||{};
      return `<tr><td>${fmtDate(tx.Date)}</td><td>${ten.FirstName||''} ${ten.LastName||''}</td><td>${tx.Description}</td>
      <td style="font-weight:600;color:${Number(tx.Amount)>=0?'#2d9b59':'#d62828'}">${Number(tx.Amount)>=0?'+':''}${fmtMoney(tx.Amount)}</td>
      <td style="font-size:.78rem;font-family:monospace">${tx.transactionRef}</td>
      <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'Verified':'Pending'}</span></td></tr>`;
    }).join('') || '<tr><td colspan="6" style="text-align:center;padding:30px;color:#aaa">No transactions yet.</td></tr>';
  }

  function renderProperties() {
    const props = myProps();
    return `<div class="table-card"><div class="table-card-header"><h5>My Properties (${props.length})</h5></div>
    <div class="table-responsive"><table class="data-table">
      <thead><tr><th>Code</th><th>Name</th><th>City</th><th>Type</th><th>Manager</th><th>Currency</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${props.map(p=>{
        const hasActiveTenants = DB.getAll('tenants').some(t=>t.PropertyCode===p.PropertyCode && t.Active==='Y');
        return `<tr>
        <td style="font-family:monospace">${p.PropertyCode}</td><td><strong>${p.PropertyName}</strong><br><span class="text-muted-sm">${p.PropertyLocation}</span></td>
        <td>${p.City}, ${p.Country}</td><td>${p.PropertyType}</td>
        <td>${p.Manager}<br><span class="text-muted-sm">${p.ManagerPhone}</span></td>
        <td>${p.Currency}</td>
        <td><span class="badge-${p.Active==='Y'?'active':'inactive'}">${p.Active==='Y'?'Active':'Inactive'}</span></td>
        <td>
          <button class="btn-edit" onclick="openEditProperty('${p.PropertyCode}')"><i class="fa-solid fa-pen"></i></button>
          ${hasActiveTenants
            ? `<button class="btn-del" disabled title="Cannot delete: has active tenants" style="opacity:.35;cursor:not-allowed"><i class="fa-solid fa-trash"></i></button>`
            : `<button class="btn-del" onclick="deleteProperty('${p.PropertyCode}')"><i class="fa-solid fa-trash"></i></button>`}
        </td>
      </tr>`;}).join('')||'<tr><td colspan="8" style="text-align:center;padding:40px;color:#aaa">No properties found.</td></tr>'}</tbody>
    </table></div></div>`;
  }

  function deleteProperty(code) {
    if (!confirm('Delete property '+code+'? This cannot be undone.')) return;
    DB.remove('properties','PropertyCode',code);
    showView('properties', document.querySelector('[data-view="properties"]'));
    toast('Property '+code+' deleted.','success');
  }

  function renderUnits() {
    window._uSearch = '';
    window._uStatus = '';
    return `<div class="table-card">
      <div class="table-card-header"><h5 id="units-hdr-title">All Units</h5></div>
      <div class="filter-bar" style="gap:10px;flex-wrap:wrap;align-items:center;">
        <i class="fa-solid fa-magnifying-glass" style="color:#aaa;flex-shrink:0"></i>
        <input id="filter-units-search" placeholder="Search by property or unit..."
               style="flex:1;min-width:180px"
               oninput="window._uSearch=this.value.toLowerCase();buildUnitGroups()">
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button id="uf-btn-all"      class="unit-status-btn uf-active" onclick="setUnitStatus('')">All</button>
          <button id="uf-btn-occupied" class="unit-status-btn"            onclick="setUnitStatus('Occupied')">Occupied</button>
          <button id="uf-btn-vacant"   class="unit-status-btn"            onclick="setUnitStatus('Vacant')">Vacant</button>
        </div>
      </div>
      <div id="unit-groups"></div>
    </div>`;
  }

  function setUnitStatus(s) {
    window._uStatus = s;
    ['all','occupied','vacant'].forEach(k => {
      const el = document.getElementById('uf-btn-' + k);
      if (el) el.classList.remove('uf-active');
    });
    const btn = document.getElementById('uf-btn-' + (s ? s.toLowerCase() : 'all'));
    if (btn) btn.classList.add('uf-active');
    buildUnitGroups();
  }

  function toggleUnitGroup(propCode) {
    window._uCollapsed = window._uCollapsed || {};
    window._uCollapsed[propCode] = !window._uCollapsed[propCode];
    buildUnitGroups();
  }

  function buildUnitGroups() {
    window._uCollapsed = window._uCollapsed || {};
    const search = window._uSearch || '';
    const status = window._uStatus || '';

    let units = myUnits().slice().sort((a,b) => {
      const pa = DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb = DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const pCmp = (pa.PropertyName||'').localeCompare(pb.PropertyName||'');
      if (pCmp !== 0) return pCmp;
      return (a.UnitNumber||'').localeCompare(b.UnitNumber||'',undefined,{numeric:true});
    });

    if (status) units = units.filter(u => u.UnitStatus === status);
    if (search) {
      units = units.filter(u => {
        const p = DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
        return (p.PropertyName||'').toLowerCase().includes(search)
            || (u.UnitNumber||'').toLowerCase().includes(search)
            || (u.UnitCode||'').toLowerCase().includes(search);
      });
    }

    const titleEl = document.getElementById('units-hdr-title');
    if (titleEl) titleEl.textContent = 'All Units (' + units.length + ')';

    const groups = {};
    const order  = [];
    units.forEach(u => {
      const p = DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
      if (!groups[u.PropertyCode]) {
        groups[u.PropertyCode] = {propName: p.PropertyName||u.PropertyCode, units:[]};
        order.push(u.PropertyCode);
      }
      groups[u.PropertyCode].units.push(u);
    });

    const container = document.getElementById('unit-groups');
    if (!container) return;

    if (!order.length) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:.9rem">No units match the current filter.</div>';
      return;
    }

    container.innerHTML = order.map(propCode => {
      const grp       = groups[propCode];
      const collapsed = window._uCollapsed[propCode];
      const totalRent = grp.units.reduce((s,u) => s + Number(u.RentAmount||0), 0);
      const totalDep  = grp.units.reduce((s,u) => s + Number(u.DepositAmount||0), 0);
      const rows = grp.units.map(u => {
        const unitTenants = DB.getAll('tenants').filter(t => t.UnitCode === u.UnitCode);
        const hasActiveTenant = unitTenants.some(t => t.Active === 'Y');
        const hasTxs = DB.getAll('transactions').some(tx => unitTenants.map(t=>t.TenantID).includes(tx.TenantID));
        const canDelete = !hasActiveTenant && !hasTxs;
        const delTitle = hasActiveTenant ? 'Has active tenant' : hasTxs ? 'Has transactions' : 'Delete unit';
        return `<tr>
          <td style="font-family:monospace">${u.UnitCode}</td>
          <td><strong>${u.UnitNumber}</strong></td>
          <td>$${Number(u.RentAmount).toLocaleString()}</td>
          <td>$${Number(u.DepositAmount).toLocaleString()}</td>
          <td><span class="${u.UnitStatus==='Occupied'?'badge-occupied':'badge-vacant'}">${u.UnitStatus}</span></td>
          <td><span class="badge-${u.Active==='Y'?'active':'inactive'}">${u.Active==='Y'?'Yes':'No'}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditUnit('${u.UnitCode}')"><i class="fa-solid fa-pen"></i></button>
            ${canDelete
              ? `<button class="btn-del" onclick="deleteUnit('${u.UnitCode}','${u.UnitNumber}')"><i class="fa-solid fa-trash"></i></button>`
              : `<button class="btn-del" disabled title="${delTitle}" style="opacity:.35;cursor:not-allowed"><i class="fa-solid fa-trash"></i></button>`}
          </td>
        </tr>`;
      }).join('');

      return `<div class="unit-group">
        <div class="unit-group-hdr" onclick="toggleUnitGroup('${propCode}')">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <i class="fa-solid fa-building" style="color:#2d9b59"></i>
            <strong style="font-size:.93rem">${grp.propName}</strong>
            <span class="unit-count-pill">${grp.units.length} unit${grp.units.length!==1?'s':''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Rent</span>
              <strong>$${totalRent.toLocaleString()}</strong>
            </span>
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Deposit</span>
              <strong>$${totalDep.toLocaleString()}</strong>
            </span>
            <i class="fa-solid fa-chevron-${collapsed?'right':'down'}" style="color:#2d9b59;font-size:.8rem"></i>
          </div>
        </div>

    window._tSearch = '';
    return `<div class="table-card">

      <div id="tenant-groups"></div>
    </div>`;

  function toggleTenantGroup(propCode) {
    window._tCollapsed = window._tCollapsed || {};
    window._tCollapsed[propCode] = !window._tCollapsed[propCode];
    buildTenantGroups();
  }

  function buildTenantGroups() {
    window._tCollapsed = window._tCollapsed || {};
    const search = window._tSearch || '';
    const allTx  = DB.getAll('transactions');

    let tenants = myTenants().slice().sort((a,b) => {
      const pa = DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb = DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const ua = DB.findOne('propunits',{UnitCode:a.UnitCode})||{};
      const ub = DB.findOne('propunits',{UnitCode:b.UnitCode})||{};
      const pCmp = (pa.PropertyName||'').localeCompare(pb.PropertyName||'');
      if (pCmp !== 0) return pCmp;
      return (ua.UnitNumber||'').localeCompare(ub.UnitNumber||'',undefined,{numeric:true});
    });

    if (search) {
      tenants = tenants.filter(t => {
        const u = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
        return (t.FirstName+' '+t.LastName).toLowerCase().includes(search)
            || (t.LastName+' '+t.FirstName).toLowerCase().includes(search)
            || (u.UnitNumber||'').toLowerCase().includes(search)
            || (t.TenantNumber||'').toLowerCase().includes(search);
      });
    }

    const titleEl = document.getElementById('tenants-hdr-title');
    if (titleEl) titleEl.textContent = 'All Tenants (' + tenants.length + ')';

    const groups = {};
    const order  = [];
    tenants.forEach(t => {
      const p = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
      if (!groups[t.PropertyCode]) {
        groups[t.PropertyCode] = {propName: p.PropertyName||t.PropertyCode, tenants:[]};
        order.push(t.PropertyCode);
      }
      groups[t.PropertyCode].tenants.push(t);
    });

    const container = document.getElementById('tenant-groups');
    if (!container) return;

    if (!order.length) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:.9rem">No tenants match the current search.</div>';
      return;
    }

    container.innerHTML = order.map(propCode => {
      const grp       = groups[propCode];
      const collapsed = window._tCollapsed[propCode];
      const totalRent = grp.tenants.reduce((s,t) => s + Number(t.RentAmount||0), 0);
      const totalDep  = grp.tenants.reduce((s,t) => s + Number(t.DepositAmount||0), 0);

      const rows = grp.tenants.map(t => {
        const u      = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
        const hasTx  = allTx.some(tx => tx.TenantID === t.TenantID);
        const canDel = t.Active !== 'Y' && !hasTx;
        const delTitle = t.Active === 'Y' ? 'Cannot delete: tenant is active' : hasTx ? 'Cannot delete: tenant has transactions' : 'Delete tenant';
        return `<tr>
          <td style="font-size:.78rem;font-family:monospace">${t.TenantNumber}</td>
          <td><strong>${t.FirstName} ${t.LastName}</strong><br><span class="text-muted-sm">${t.Email}</span></td>
          <td style="font-size:.78rem">${t.IDNumber}</td>
          <td><strong>${u.UnitNumber||'?'}</strong></td>
          <td>$${Number(t.RentAmount).toLocaleString()} / ${t.RentFrequency}</td>
          <td>$${Number(t.DepositAmount||0).toLocaleString()}</td>
          <td>${fmtDate(t.MoveInDate)}</td>
          <td><span class="badge-${t.Active==='Y'?'active':'inactive'}">${t.Active==='Y'?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditTenant('${t.TenantID}')"><i class="fa-solid fa-pen"></i></button>
            ${canDel
              ? `<button class="btn-del" onclick="deleteTenant('${t.TenantID}','${t.FirstName} ${t.LastName}')" title="${delTitle}"><i class="fa-solid fa-trash"></i></button>`
              : `<button class="btn-del" disabled title="${delTitle}" style="opacity:.35;cursor:not-allowed"><i class="fa-solid fa-trash"></i></button>`}
          </td>
        </tr>`;
      }).join('');

      return `<div class="unit-group">
        <div class="tenant-group-hdr" onclick="toggleTenantGroup('${propCode}')">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <i class="fa-solid fa-building" style="color:#2d9b59"></i>
            <strong style="font-size:.93rem">${grp.propName}</strong>
            <span class="tenant-count-pill">${grp.tenants.length} tenant${grp.tenants.length!==1?'s':''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Rent</span>
              <strong>$${totalRent.toLocaleString()}</strong>
            </span>
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Deposit</span>
              <strong>$${totalDep.toLocaleString()}</strong>
            </span>
            <i class="fa-solid fa-chevron-${collapsed?'right':'down'}" style="color:#2d9b59;font-size:.8rem"></i>
          </div>
        </div>
        <div class="tenant-grp-body" style="display:${collapsed?'none':'block'}">
          <div class="table-responsive">
            <table class="data-table">
              <thead><tr><th>Tenant#</th><th>Name</th><th>ID</th><th>Unit#</th><th>Rent</th><th>Deposit</th><th>Move-in</th><th>Active</th><th>Actions</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function openEditTx(ref) {
    const tx = DB.getAll('transactions').find(t=>t.transactionRef===ref);
    if (!tx) return;
    openModal('Edit Transaction — '+ref, `
      <div class="form-row"><div class="form-group"><label class="form-label-sm">Date</label><input class="form-control-sm2" id="etx-date" type="date" value="${tx.Date}"></div>
      <div class="form-group"><label class="form-label-sm">Amount</label><input class="form-control-sm2" id="etx-amt" type="number" step="0.01" value="${tx.Amount}"></div></div>
      <div class="form-group"><label class="form-label-sm">Description</label><input class="form-control-sm2" id="etx-desc" value="${tx.Description}"></div>
      <div class="form-group"><label class="form-label-sm">Note</label><textarea class="form-control-sm2" id="etx-note" rows="2">${tx.TransactionNote||''}</textarea></div>
      <div class="form-group"><label class="form-label-sm">Replace Document (optional)</label><input class="form-control-sm2" id="etx-doc" type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"></div>
      ${tx.TransactionDocument?`<div style="font-size:.8rem;color:#2d9b59;margin-top:4px"><i class="fa-solid fa-file-circle-check"></i> Document already attached</div>`:''}`,
      `<button class="btn-primary-custom bg-client" onclick="saveEditTx('${ref}')">Save Changes</button><button class="btn-back" onclick="closeModal()">Cancel</button>`
    );
  }

  function saveEditTx(ref) {
    const desc   = document.getElementById('etx-desc').value.trim();
    const amt    = parseFloat(document.getElementById('etx-amt').value);
    const docInput = document.getElementById('etx-doc');
    if (!desc || isNaN(amt)) { toast('Description and amount are required.','error'); return; }
    const tx = DB.getAll('transactions').find(t=>t.transactionRef===ref);
    function doUpdate(docData) {
      const updates = {
        Date:document.getElementById('etx-date').value,
        Description:desc, Amount:amt,
        TransactionNote:document.getElementById('etx-note').value.trim(),
        UpdateUser:client.UserName
      };
      if (docData !== null) updates.TransactionDocument = docData;
      DB.update('transactions','transactionRef',ref,updates);
      closeModal(); showView('transactions', document.querySelector('[data-view="transactions"]'));
      toast('Transaction updated!','success');
    }
    if (docInput.files[0]) {
      const reader = new FileReader();
      reader.onload = e => doUpdate(e.target.result);
      reader.readAsDataURL(docInput.files[0]);
    } else { doUpdate(null); }
  }

  function deleteTx(ref) {
    const tx = DB.getAll('transactions').find(t=>t.transactionRef===ref);
    if (!tx || tx.Authenticated==='Y') { toast('Verified transactions cannot be deleted.','error'); return; }
    if (!confirm('Delete transaction '+ref+'? This cannot be undone.')) return;
    DB.remove('transactions','transactionRef',ref);
    showView('transactions', document.querySelector('[data-view="transactions"]'));
    toast('Transaction '+ref+' deleted.','success');
  }

  function downloadUnitTemplate() {

  function renderUnitsPreview(rows) {
    const validCodes = myProps().map(p => p.PropertyCode);
    const seen = {};
    let validCount = 0;
    const rowData = rows.map((row) => {
      const errors = [];
      const propCode = String(row.PropertyCode||'').trim();
      const unitNum  = String(row.UnitNumber||'').trim();
      if (!propCode) errors.push('PropertyCode required');
      else if (!validCodes.includes(propCode)) errors.push('PropertyCode not found');
      if (!unitNum) errors.push('UnitNumber required');
      else if (propCode && validCodes.includes(propCode)) {
        if (DB.find('propunits',{PropertyCode:propCode}).some(u=>String(u.UnitNumber)===unitNum)) errors.push('Unit already exists');
        const bk = propCode+'|'+unitNum;
        if (seen[bk]) errors.push('Duplicate in file'); else seen[bk]=true;
      }
      if (row.RentAmount===''    || isNaN(Number(row.RentAmount)))    errors.push('Invalid RentAmount');
      if (row.DepositAmount==='' || isNaN(Number(row.DepositAmount))) errors.push('Invalid DepositAmount');
      if (row.Bedrooms===''      || isNaN(Number(row.Bedrooms)))      errors.push('Invalid Bedrooms');
      if (row.Bathrooms===''     || isNaN(Number(row.Bathrooms)))     errors.push('Invalid Bathrooms');
      if (row.Floor===''         || isNaN(Number(row.Floor)))         errors.push('Invalid Floor');
      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, propCode, unitNum, valid, errors};
    });
    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length-validCount} errors</strong></div>`;
    html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:.76rem"><thead><tr><th>#</th><th>PropertyCode</th><th>UnitNumber</th><th>Rent</th><th>Deposit</th><th>Bed</th><th>Bath</th><th>Floor</th><th>Status</th><th>Validation</th></tr></thead><tbody>`;
    rowData.forEach(({row,propCode,unitNum,valid,errors},i) => {
      html += `<tr style="background:${valid?'':'#fff5f5'}"><td>${i+1}</td><td style="font-family:monospace">${propCode}</td><td>${unitNum}</td><td>${row.RentAmount}</td><td>${row.DepositAmount}</td><td>${row.Bedrooms}</td><td>${row.Bathrooms}</td><td>${row.Floor}</td><td>${String(row.UnitStatus||'Vacant')}</td><td style="color:${valid?'#2d9b59':'#d62828'};font-size:.78rem">${valid?'<i class="fa-solid fa-check"></i> OK':errors.join('; ')}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    if (rows.length-validCount>0) html += `<div style="font-size:.78rem;color:#888;margin-top:6px"><i class="fa-solid fa-circle-info"></i> Only valid rows will be imported.</div>`;
    document.getElementById('uu-preview').innerHTML = html;
    const btn = document.getElementById('uu-save-btn');
    if (btn) { btn.style.display = validCount>0?'':'none'; btn.innerHTML=`<i class="fa-solid fa-upload"></i> Import ${validCount} Unit(s)`; }
    window._unitUploadRowData = rowData;
  }

  function renderTenantsPreview(rows) {
    const validCodes = myProps().map(p => p.PropertyCode);
    const FREQ = ['Monthly','Quarterly','SemiAnnually','Annually'];
    let validCount = 0;
    const rowData = rows.map((row) => {
      const errors = [];
      const propCode = String(row.PropertyCode||'').trim();
      const unitNum  = String(row.UnitNumber||'').trim();
      if (!String(row.FirstName||'').trim()) errors.push('FirstName required');
      if (!String(row.LastName||'').trim())  errors.push('LastName required');
      if (!String(row.IDNumber||'').trim())  errors.push('IDNumber required');
      if (!String(row.Telephone||'').trim()) errors.push('Telephone required');
      if (!String(row.Email||'').trim())     errors.push('Email required');
      if (!String(row.Address||'').trim())   errors.push('Address required');
      if (!propCode) errors.push('PropertyCode required');
      else if (!validCodes.includes(propCode)) errors.push('PropertyCode not found');
      let resolvedUnitCode = '';
      if (!unitNum) errors.push('UnitNumber required');
      else if (propCode && validCodes.includes(propCode)) {
        const unit = DB.find('propunits',{PropertyCode:propCode}).find(u=>String(u.UnitNumber)===unitNum);
        if (!unit) errors.push(`Unit ${unitNum} not found in ${propCode}`);
        else resolvedUnitCode = unit.UnitCode;
      }
      if (row.RentAmount===''    || isNaN(Number(row.RentAmount)))    errors.push('Invalid RentAmount');
      if (row.DepositAmount==='' || isNaN(Number(row.DepositAmount))) errors.push('Invalid DepositAmount');
      const freq = String(row.RentFrequency||'').trim();
      if (!freq) errors.push('RentFrequency required');
      else if (!FREQ.includes(freq)) errors.push(`RentFrequency: ${FREQ.join(' | ')}`);
      const nd = normDate(row.MoveInDate);
      if (!nd) errors.push('MoveInDate required');
      else if (isNaN(Date.parse(nd))) errors.push('Invalid MoveInDate');
      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, propCode, unitNum, resolvedUnitCode, normDate:nd, valid, errors};
    });
    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length-validCount} errors</strong></div>`;
    html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:.76rem"><thead><tr><th>#</th><th>Name</th><th>ID Number</th><th>Email</th><th>PropertyCode</th><th>Unit</th><th>Rent</th><th>Freq</th><th>Move-in</th><th>Validation</th></tr></thead><tbody>`;
    rowData.forEach(({row,propCode,unitNum,normDate:nd,valid,errors},i) => {
      html += `<tr style="background:${valid?'':'#fff5f5'}"><td>${i+1}</td><td><strong>${String(row.FirstName||'')} ${String(row.LastName||'')}</strong></td><td style="font-family:monospace;font-size:.74rem">${row.IDNumber||''}</td><td style="font-size:.74rem">${row.Email||''}</td><td style="font-family:monospace">${propCode}</td><td>${unitNum}</td><td>${row.RentAmount||''}</td><td>${row.RentFrequency||''}</td><td>${nd||row.MoveInDate||''}</td><td style="color:${valid?'#2d9b59':'#d62828'};font-size:.78rem;min-width:140px">${valid?'<i class="fa-solid fa-check"></i> OK':errors.join('; ')}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    if (rows.length-validCount>0) html += `<div style="font-size:.78rem;color:#888;margin-top:6px"><i class="fa-solid fa-circle-info"></i> Only valid rows imported. Photos/ID copies/agreements can be attached via Edit Tenant.</div>`;
    document.getElementById('tu-preview').innerHTML = html;
    const btn = document.getElementById('tu-save-btn');
    if (btn) { btn.style.display = validCount>0?'':'none'; btn.innerHTML=`<i class="fa-solid fa-upload"></i> Import ${validCount} Tenant(s)`; }
    window._tenantUploadRowData = rowData;
  }

  function saveBulkPostTx() {
    const propCode   = document.getElementById('bptx-prop').value;
    const date       = document.getElementById('bptx-date').value;
    const chargeType = document.getElementById('bptx-chargetype').value;
    const desc       = document.getElementById('bptx-desc').value.trim();
    const note       = document.getElementById('bptx-note').value.trim();
    const customAmt  = parseFloat(document.getElementById('bptx-amt') ? document.getElementById('bptx-amt').value : '');
    if (!propCode) { toast('Property is required.','error'); return; }
    if (!date)     { toast('Date is required.','error'); return; }
    if (!desc)     { toast('Description is required.','error'); return; }
    if (chargeType==='custom' && isNaN(customAmt)) { toast('Amount is required for custom charge.','error'); return; }
    const selected = Array.from(document.querySelectorAll('.bptx-cb:checked'));
    if (!selected.length) { toast('Select at least one tenant.','error'); return; }
    const prop = DB.findOne('properties',{PropertyCode:propCode})||{};
    let count = 0;
    selected.forEach(cb => {
      const tenant = DB.findOne('tenants',{TenantID:cb.value});
      if (!tenant) return;
      const amount = chargeType==='rent' ? Number(tenant.RentAmount) : customAmt;
      DB.insert('transactions',{
        Date:date, TenantID:cb.value, Authenticated:'N',
        PropertyCode:propCode, Description:desc, Amount:amount,
        Currency:prop.Currency||'USD', TransactionNote:note,
        TransactionDocument:'', transactionRef:DB.nextTxRef(), UpdateUser:client.UserName
      });
      count++;
    });
    closeModal();
    showView('transactions', document.querySelector('[data-view="transactions"]'));
    toast(`Bulk post complete — ${count} transaction${count!==1?'s':''} posted!`,'success');
  }

    if (DB.getAll('transactions').some(tx=>tx.TenantID===id)) { toast('Cannot delete: tenant has transactions.','error'); return; }
    if (!confirm('Delete tenant '+t.FirstName+' '+t.LastName+'? This cannot be undone.')) return;
    DB.remove('tenants','TenantID',id);
    showView('tenants', document.querySelector('[data-view="tenants"]'));
    toast('Tenant deleted.','success');
  }

      });

  function saveProfile(e) {
    e.preventDefault();
    const cl = DB.findOne('clients', { ClientCode: client.ClientCode });
    if (!cl) { toast('Client record not found.', 'error'); return; }

    const name    = document.getElementById('prof-name').value.trim();
    const email   = document.getElementById('prof-email').value.trim();
    const tel     = document.getElementById('prof-tel').value.trim();
    const address = document.getElementById('prof-address').value.trim();
    const newPwd  = document.getElementById('prof-new-pwd').value;
    const confPwd = document.getElementById('prof-conf-pwd').value;

    if (!name || !email) { toast('Name and email are required.', 'error'); return; }

    const updates = { ClientName: name, Email: email, Telephone: tel, Address: address };

    if (newPwd || confPwd) {
      if (newPwd.length < 6) { toast('New password must be at least 6 characters.', 'error'); return; }
      if (newPwd !== confPwd) { toast('New passwords do not match.', 'error'); return; }
      updates.Password = newPwd;
      updates.password = newPwd;
    }

    DB.update('clients', 'ClientCode', client.ClientCode, updates);
    client = DB.findOne('clients', { ClientCode: client.ClientCode });
    document.getElementById('sb-name').textContent = client.ClientName;
    document.getElementById('sb-avatar').textContent = client.ClientName[0].toUpperCase();

    document.getElementById('prof-new-pwd').value = '';
    document.getElementById('prof-conf-pwd').value = '';

    toast('Profile updated successfully.', 'success');
  }

              <div style="display:flex;gap:6px">
                <button type="button" class="btn-back" style="padding:3px 10px;font-size:.78rem" onclick="tstmtSelectAll(true)">Select All</button>
                <button type="button" class="btn-back" style="padding:3px 10px;font-size:.78rem" onclick="tstmtSelectAll(false)">None</button>
              </div>
            </div>
            <div id="rpt-tstmt-list" style="border:1px solid #dde1ef;border-radius:8px;max-height:200px;overflow-y:auto;padding:4px 0">
              ${renderStmtTenantCheckboxes(myTenants())}
            </div>
          </div>
          <button class="btn-primary-custom bg-client" style="margin-top:12px" onclick="genTenantStmtReport()"><i class="fa-solid fa-chart-bar"></i> Generate</button>
        </div>
      </div>
      <div id="rpt-tstmt-out" style="display:none"></div>
    </div>

    <!-- Report 3: List of Tenants -->
    <div id="rpanel-tlist" style="display:none">
      <div class="table-card" style="margin-bottom:16px;">
        <div class="table-card-header rpt-controls-area"><h5><i class="fa-solid fa-users"></i> List of Tenants</h5></div>
        <div class="modal-body-pad rpt-controls-area">
          <div class="form-row">
            <div class="form-group"><label class="form-label-sm">Property</label>
              <select class="form-control-sm2" id="rpt-tlist-prop">
                <option value="">All Properties</option>${propOpts}
              </select>
            </div>
            <div class="form-group"><label class="form-label-sm">Status</label>
              <div style="display:flex;gap:4px;margin-top:4px">
                <button id="tl-btn-all"      class="unit-status-btn uf-active" onclick="setTlistStatus('')">All</button>
                <button id="tl-btn-active"   class="unit-status-btn"           onclick="setTlistStatus('Y')">Active</button>
                <button id="tl-btn-inactive" class="unit-status-btn"           onclick="setTlistStatus('N')">Inactive</button>
              </div>
            </div>
          </div>
          <button class="btn-primary-custom bg-client" onclick="genTenantListReport()"><i class="fa-solid fa-chart-bar"></i> Generate</button>
        </div>
      </div>
      <div id="rpt-tlist-out" style="display:none"></div>
    </div>

    <!-- Report 4: Units List -->
    <div id="rpanel-ulist" style="display:none">
      <div class="table-card" style="margin-bottom:16px;">
        <div class="table-card-header rpt-controls-area"><h5><i class="fa-solid fa-door-open"></i> Units List</h5></div>
        <div class="modal-body-pad rpt-controls-area">
          <div class="form-row">
            <div class="form-group"><label class="form-label-sm">Property</label>
              <select class="form-control-sm2" id="rpt-ulist-prop">
                <option value="">All Properties</option>${propOpts}
              </select>
            </div>
            <div class="form-group"><label class="form-label-sm">Status</label>
              <div style="display:flex;gap:4px;margin-top:4px">
                <button id="ul-btn-all"      class="unit-status-btn uf-active" onclick="setUlistStatus('')">All</button>
                <button id="ul-btn-occupied" class="unit-status-btn"           onclick="setUlistStatus('Occupied')">Occupied</button>
                <button id="ul-btn-vacant"   class="unit-status-btn"           onclick="setUlistStatus('Vacant')">Vacant</button>
              </div>
            </div>
          </div>
          <button class="btn-primary-custom bg-client" onclick="genUnitListReport()"><i class="fa-solid fa-chart-bar"></i> Generate</button>
        </div>
      </div>
      <div id="rpt-ulist-out" style="display:none"></div>
    </div>`;
  }

  function showRptTab(tab) {
    ['ptx','tstmt','tlist','ulist'].forEach(t => {
      document.getElementById('rpanel-'+t).style.display  = t===tab ? '' : 'none';
      document.getElementById('rtab-'+t).style.opacity    = t===tab ? '1' : '.45';
    });
    if (tab === 'tstmt') {
      setTimeout(() => {
        document.querySelectorAll('.tstmt-cb').forEach(cb => cb.addEventListener('change', updateStmtCount));
        updateStmtCount();
      }, 50);
    }
  }

  function renderStmtTenantCheckboxes(tenants) {
    if (!tenants.length) return '<div style="text-align:center;padding:16px;color:#aaa;font-size:.85rem">No tenants found.</div>';
    return tenants.map(t => {
      const u = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
      const p = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
      return `<label style="display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:.88rem" onmouseover="this.style.background='#f5f7ff'" onmouseout="this.style.background=''">
        <input type="checkbox" class="tstmt-cb" value="${t.TenantID}" checked style="width:15px;height:15px;cursor:pointer;accent-color:#2d9b59">
        <span style="flex:1"><strong>${t.FirstName} ${t.LastName}</strong> <span style="color:#888;font-size:.78rem">(${t.TenantNumber})</span></span>
        <span style="color:#888;font-size:.78rem;text-align:right">${p.PropertyName||'—'} · Unit ${u.UnitNumber||'?'}</span>
      </label>`;
    }).join('');
  }

  function cascadeStmtTenants() {
    const propCode = document.getElementById('rpt-tstmt-prop').value;
    let tenants = myTenants();
    if (propCode) tenants = tenants.filter(t => t.PropertyCode === propCode);
    const list = document.getElementById('rpt-tstmt-list');
    if (list) {
      list.innerHTML = renderStmtTenantCheckboxes(tenants);
      document.querySelectorAll('.tstmt-cb').forEach(cb => cb.addEventListener('change', updateStmtCount));
      updateStmtCount();
    }
  }

  function updateStmtCount() {
    const n = document.querySelectorAll('.tstmt-cb:checked').length;
    const el = document.getElementById('tstmt-count');
    if (el) el.textContent = n + ' selected';
  }

  function tstmtSelectAll(checked) {
    document.querySelectorAll('.tstmt-cb').forEach(cb => cb.checked = checked);
    updateStmtCount();
  }

  function setUlistStatus(s) {
    window._ulistStatus = s;
    ['all','occupied','vacant'].forEach(k => {
      const el = document.getElementById('ul-btn-' + k);
      if (el) el.classList.toggle('uf-active', k === (s ? s.toLowerCase() : 'all'));
    });
  }

  function genUnitListReport() {
    const propCode    = document.getElementById('rpt-ulist-prop').value;
    const status      = window._ulistStatus || '';
    let units = myUnits();
    if (propCode) units = units.filter(u => u.PropertyCode === propCode);
    if (status)   units = units.filter(u => u.UnitStatus === status);
    units = units.slice().sort((a,b) => {
      const pa = DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb = DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      return (pa.PropertyName||'').localeCompare(pb.PropertyName||'')
          || (a.UnitNumber||'').localeCompare(b.UnitNumber||'',undefined,{numeric:true,sensitivity:'base'});
    });
    const prop        = propCode ? (DB.findOne('properties',{PropertyCode:propCode})||{PropertyName:propCode}) : {PropertyName:'All Properties'};
    const statusLabel = status || 'All';
    const rows = units.map(u => {
      const p = DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
      return `<tr>
        <td style="font-family:monospace">${u.UnitCode}</td>
        <td><strong>${u.UnitNumber}</strong></td>
        <td>${p.PropertyName||'?'}</td>
        <td>${p.Currency||'$'}${Number(u.RentAmount).toLocaleString()}</td>
        <td>${p.Currency||'$'}${Number(u.DepositAmount).toLocaleString()}</td>
        <td><span class="${u.UnitStatus==='Occupied'?'badge-occupied':'badge-vacant'}">${u.UnitStatus}</span></td>
        <td><span class="badge-${u.Active==='Y'?'active':'inactive'}">${u.Active==='Y'?'Yes':'No'}</span></td>
      </tr>`;
    }).join('');
    const out = document.getElementById('rpt-ulist-out');
    out.style.display = '';
    out.innerHTML = `
    <div class="table-card">
      <div class="table-card-header">
        <div>
          <div style="font-weight:700;font-size:1rem">Units List — ${prop.PropertyName}</div>
          <div style="font-size:.82rem;color:#888">Printed: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})} · Status: ${statusLabel} · ${units.length} unit(s)</div>
        </div>
      </div>
      <div class="table-responsive">
        <table class="data-table" style="font-size:.82rem">
          <thead><tr><th>Unit Code</th><th>Unit #</th><th>Property</th><th>Rent</th><th>Deposit</th><th>Status</th><th>Active</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:30px;color:#aaa">No units found.</td></tr>'}</tbody>
        </table>
      </div>
    </div>
    <div class="rpt-print-btn" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn-primary-custom bg-client" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('rpt-ulist-out','unit-list')"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
      <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('rpt-ulist-out','unit-list')"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
    </div>`;
  }

  function genPropTxReport() {
    const propCode = document.getElementById('rpt-ptx-prop').value;
    const from     = document.getElementById('rpt-ptx-from').value;
    const to       = document.getElementById('rpt-ptx-to').value;
    if (!propCode) { toast('Select a property.','error'); return; }
    if (!from || !to) { toast('Enter both date range dates.','error'); return; }
    const prop = DB.findOne('properties',{PropertyCode:propCode})||{};
    const tIds = myTenants().filter(t=>t.PropertyCode===propCode).map(t=>t.TenantID);
    const txs  = DB.getAll('transactions')
      .filter(tx=>tIds.includes(tx.TenantID) && tx.Date>=from && tx.Date<=to)
      .sort((a,b)=>new Date(a.Date)-new Date(b.Date));
    let runBal = 0;
    const rows = txs.map(tx=>{
      runBal += Number(tx.Amount);
      const ten = DB.findOne('tenants',{TenantID:tx.TenantID})||{};
      const cr  = Number(tx.Amount)>=0;
      return `<tr>
        <td>${fmtDate(tx.Date)}</td>
        <td>${ten.FirstName||''} ${ten.LastName||''}</td>
        <td>${tx.Description}</td>
        <td style="font-family:monospace;font-size:.78rem">${tx.transactionRef}</td>
        <td style="text-align:right;color:#d62828">${!cr?fmtMoney(Math.abs(Number(tx.Amount))):'—'}</td>
        <td style="text-align:right;color:#1a6b3c">${cr?fmtMoney(Number(tx.Amount)):'—'}</td>
        <td style="text-align:right;font-weight:700;color:${runBal>=0?'#1a6b3c':'#d62828'}">${fmtMoney(runBal)}</td>
        <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'Verified':'Pending'}</span></td>
      </tr>`;
    }).join('');
    const out = document.getElementById('rpt-ptx-out');
    out.style.display = '';
    out.innerHTML = `
    <div class="table-card">
      <div class="table-card-header">
        <div>
          <div style="font-weight:700;font-size:1rem">${prop.PropertyName||propCode} — Transactions</div>
          <div style="font-size:.82rem;color:#888">${fmtDate(from)} to ${fmtDate(to)}</div>
        </div>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>Date</th><th>Tenant</th><th>Description</th><th>Reference</th><th style="text-align:right">Debit</th><th style="text-align:right">Credit</th><th style="text-align:right">Balance</th><th>Status</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="8" style="text-align:center;padding:30px;color:#aaa">No transactions in this range.</td></tr>'}</tbody>
          <tfoot><tr style="background:#f8f9ff">
            <td colspan="6" style="text-align:right;font-weight:700;padding:12px 16px">Closing Balance:</td>
            <td style="text-align:right;font-weight:700;color:${runBal>=0?'#1a6b3c':'#d62828'};padding:12px 16px">${fmtMoney(runBal)}</td><td></td>
          </tr></tfoot>
        </table>
      </div>
    </div>
    <div class="rpt-print-btn" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn-primary-custom bg-client" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('rpt-ptx-out','property-transactions')"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
      <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('rpt-ptx-out','property-transactions')"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
    </div>`;
  }

  function genTenantStmtReport() {
    const selected = Array.from(document.querySelectorAll('.tstmt-cb:checked')).map(cb=>cb.value);
    if (!selected.length) { toast('Select at least one tenant.','error'); return; }
    const out = document.getElementById('rpt-tstmt-out');
    out.style.display = '';
    out.innerHTML = selected.map(tid => {
      const t    = DB.findOne('tenants',{TenantID:tid});
      if (!t) return '';
      const prop = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
      const unit = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
      const txs  = DB.find('transactions',{TenantID:tid}).sort((a,b)=>new Date(a.Date)-new Date(b.Date));
      let runBal = 0;
      const rows = txs.map(tx=>{
        runBal += Number(tx.Amount);
        const cr = Number(tx.Amount)>=0;
        return `<tr>
          <td>${fmtDate(tx.Date)}</td>
          <td>${tx.Description}</td>
          <td style="font-family:monospace;font-size:.78rem">${tx.transactionRef}</td>
          <td style="text-align:right;color:#d62828">${!cr?fmtMoney(Math.abs(Number(tx.Amount))):'—'}</td>
          <td style="text-align:right;color:#1a6b3c">${cr?fmtMoney(Number(tx.Amount)):'—'}</td>
          <td style="text-align:right;font-weight:700;color:${runBal>=0?'#1a6b3c':'#d62828'}">${fmtMoney(runBal)}</td>
          <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'Verified':'Pending'}</span></td>
        </tr>`;
      }).join('');
      return `
      <div class="table-card" style="margin-bottom:20px;page-break-after:always;">
        <div class="table-card-header">
          <div>
            <div style="font-weight:700">${t.FirstName} ${t.LastName} <span style="font-weight:400;font-size:.85rem;color:#888">(${t.TenantNumber})</span></div>
            <div style="font-size:.82rem;color:#888">${prop.PropertyName||'—'} · Unit ${unit.UnitNumber||'—'} · Rent $${Number(t.RentAmount).toLocaleString()}/${t.RentFrequency}</div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="data-table">
            <thead><tr><th>Date</th><th>Description</th><th>Reference</th><th style="text-align:right">Debit</th><th style="text-align:right">Credit</th><th style="text-align:right">Balance</th><th>Status</th></tr></thead>
            <tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:#aaa">No transactions.</td></tr>'}</tbody>
            <tfoot><tr style="background:#f8f9ff">
              <td colspan="5" style="text-align:right;font-weight:700;padding:10px 16px">Closing Balance:</td>
              <td style="text-align:right;font-weight:700;color:${runBal>=0?'#1a6b3c':'#d62828'};padding:10px 16px">${fmtMoney(runBal)}</td><td></td>
            </tr></tfoot>
          </table>
        </div>
      </div>`;
    }).join('') + `<div class="rpt-print-btn" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn-primary-custom bg-client" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('rpt-tstmt-out','tenant-statements')"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
      <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('rpt-tstmt-out','tenant-statements')"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
    </div>`;
  }

  function setTlistStatus(s) {
    window._tlistStatus = s;
    ['all','active','inactive'].forEach(k => {
      const el = document.getElementById('tl-btn-' + k);
      if (el) el.classList.toggle('uf-active', k === (s === 'Y' ? 'active' : s === 'N' ? 'inactive' : 'all'));
    });
  }

  function genTenantListReport() {
    const propCode = document.getElementById('rpt-tlist-prop').value;
    const statusFlt = window._tlistStatus || '';
    let tenants = myTenants();
    if (propCode)   tenants = tenants.filter(t => t.PropertyCode === propCode);
    if (statusFlt)  tenants = tenants.filter(t => t.Active === statusFlt);
    tenants = tenants.slice().sort((a,b) => {
      const pa = DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb = DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const ua = DB.findOne('propunits',{UnitCode:a.UnitCode})||{};
      const ub = DB.findOne('propunits',{UnitCode:b.UnitCode})||{};
      return (pa.PropertyName||'').localeCompare(pb.PropertyName||'')
          || (ua.UnitNumber||'').localeCompare(ub.UnitNumber||'',undefined,{numeric:true,sensitivity:'base'});
    });
    const prop = propCode ? (DB.findOne('properties',{PropertyCode:propCode})||{PropertyName:propCode}) : {PropertyName:'All Properties'};
    const rows = tenants.map(t => {
      const p = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
      const u = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
      return `<tr>
        <td style="font-family:monospace">${t.TenantNumber}</td>
        <td>${t.FirstName} ${t.LastName}</td>
        <td>${t.IDNumber}</td>
        <td>${p.PropertyName||'—'}</td>
        <td>${u.UnitNumber||'?'}</td>
        <td>$${Number(t.RentAmount).toLocaleString()} / ${t.RentFrequency}</td>
        <td>${fmtDate(t.MoveInDate)}</td>
        <td>${t.MoveOutDate ? fmtDate(t.MoveOutDate) : '—'}</td>
        <td><span class="badge-${t.Active==='Y'?'active':'inactive'}">${t.Active==='Y'?'Active':'Inactive'}</span></td>
      </tr>`;
    }).join('');
    const out = document.getElementById('rpt-tlist-out');
    out.style.display = '';
    out.innerHTML = `
    <div class="table-card">
      <div class="table-card-header">
        <div>
          <div style="font-weight:700;font-size:1rem">Tenant List — ${prop.PropertyName}</div>
          <div style="font-size:.82rem;color:#888">Printed: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})} · ${tenants.length} tenant(s)</div>
        </div>
      </div>
      <div class="table-responsive">
        <table class="data-table" style="font-size:.82rem">
          <thead><tr><th>Tenant#</th><th>Name</th><th>ID Number</th><th>Property</th><th>Unit#</th><th>Rent</th><th>Move-in</th><th>Move-out</th><th>Status</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="9" style="text-align:center;padding:30px;color:#aaa">No tenants found.</td></tr>'}</tbody>
        </table>
      </div>
    </div>
    <div class="rpt-print-btn" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn-primary-custom bg-client" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
      <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('rpt-tlist-out','tenant-list')"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
      <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('rpt-tlist-out','tenant-list')"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
    </div>`;
  }

  function exportRptCSV(outId, filename) {
    const tbl = document.getElementById(outId).querySelector('table');
    if (!tbl) { toast('Generate a report first.','error'); return; }
    const rows = Array.from(tbl.querySelectorAll('tr'));
    const csv = rows.map(r => Array.from(r.querySelectorAll('th,td')).map(c => {
      const t = c.innerText.replace(/"/g,'""');
      return `"${t}"`;
    }).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = filename+'.csv'; a.click();
  }

  function exportRptXLSX(outId, filename) {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded.','error'); return; }
    const tbl = document.getElementById(outId).querySelector('table');
    if (!tbl) { toast('Generate a report first.','error'); return; }
    const wb = XLSX.utils.table_to_book(tbl, {sheet:'Report'});
    XLSX.writeFile(wb, filename+'.xlsx');
  }

  function toast(msg, type='info') {
    const c = document.getElementById('toast-container');
    const d = document.createElement('div');
    d.className = `toast-msg toast-${type}`;
    d.textContent = msg;
    c.appendChild(d);
    setTimeout(()=>d.remove(),4000);
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

  // Initial render
  showView('dashboard', document.querySelector('[data-view="dashboard"]'));
</script>
</body>
