<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Admin — Property Management</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <script>(function(){const t=localStorage.getItem('pma_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .overview-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
    .search-bar input,.search-bar select { min-width:160px; }
    .pill { display:inline-block;padding:2px 9px;border-radius:12px;font-size:.73rem;font-weight:600; }
    .pill-master { background:#ffe5e5;color:#9b0000; }
    .pill-agency { background:#f3e8ff;color:#480088; }
    .filter-bar { display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f0f0f0; }
    .filter-bar input { max-width:280px;padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:.85rem; }
    .filter-bar input:focus { outline:none;border-color:#9b0000; }
  </style>
</head>
<body>
<div class="dash-wrap">
  <aside class="sidebar sidebar-master">
    <div class="sidebar-brand">
      <div class="app-name">Property Management</div>
      <div class="role-name"><i class="fa-solid fa-shield-halved"></i> Master Admin</div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">M</div>
      <div>
        <div class="user-name"  id="sb-name">Master</div>
        <div class="user-role" id="sb-code">—</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <ul style="padding:0;margin:0;">
        <li class="nav-item"><button class="nav-link-btn active" data-view="dashboard"    onclick="showView('dashboard',this)"><i class="fa-solid fa-gauge-high"></i> Dashboard</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="agencies"      onclick="showView('agencies',this)"><i class="fa-solid fa-landmark"></i> Agencies</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="clients"       onclick="showView('clients',this)"><i class="fa-solid fa-user-tie"></i> Clients</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="properties"    onclick="showView('properties',this)"><i class="fa-solid fa-building"></i> Properties</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="units"         onclick="showView('units',this)"><i class="fa-solid fa-door-open"></i> Units</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="tenants"       onclick="showView('tenants',this)"><i class="fa-solid fa-users"></i> Tenants</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="transactions"  onclick="showView('transactions',this)"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</button></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <h2 id="page-title">Master Dashboard</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle dark / light mode"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
    </div>
    <div class="page-content" id="view-container"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="toast-container" id="toast-container"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box modal-box-lg" id="modal-box">
    <div class="modal-hdr bg-master" id="modal-hdr">
      <h5 id="modal-title">Form</h5>
      <button class="btn-close-modal" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body-pad" id="modal-body"></div>
    <div class="modal-footer-pad" id="modal-footer"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/api.js"></script>
<script>
  DB.init();

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('pma_theme', next);
    document.getElementById('theme-icon').className = next === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  (function(){ const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; const i = document.getElementById('theme-icon'); if(i) i.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon'; })();

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  document.querySelectorAll('.nav-link-btn').forEach(btn => {
    btn.addEventListener('click', () => { if (window.innerWidth <= 768) toggleSidebar(); });
  });

  const sess = JSON.parse(sessionStorage.getItem('pma_session') || 'null');
  if (!sess || sess.role !== 'master') { window.location.href = 'index.html'; }

  let masterAgency = DB.findOne('agencies', { AgencyCode: sess.id, Master: 'Y' });
  if (!masterAgency) { window.location.href = 'index.html'; }

  document.getElementById('sb-avatar').textContent = masterAgency.AgencyName[0].toUpperCase();
  document.getElementById('sb-name').textContent   = masterAgency.AgencyName;
  document.getElementById('sb-code').textContent   = 'Master — ' + masterAgency.AgencyCode;

  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  function fmtDate(d)  { return d ? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—'; }
  function fmtMoney(n) { const abs=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2}); return (n<0?'-':'')+'$'+abs; }

  // All data — master sees everything
  const A = () => DB.getAll('agencies');
  const C = () => DB.getAll('clients');
  const P = () => DB.getAll('properties');
  const U = () => DB.getAll('propunits');
  const T = () => DB.getAll('tenants');
  const TX= () => DB.getAll('transactions').sort((a,b)=>new Date(b.Date)-new Date(a.Date));

  // ── FILTER ─────────────────────────────────────────────
  function filterTable(inputId, tableId) {
    const q = document.getElementById(inputId).value.toLowerCase();
    document.querySelectorAll('#' + tableId + ' tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  function showView(view, btn) {
    document.querySelectorAll('.nav-link-btn').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const titles={dashboard:'Master Dashboard',agencies:'Agencies',clients:'All Clients',properties:'All Properties',units:'All Units',tenants:'All Tenants',transactions:'All Transactions'};
    document.getElementById('page-title').textContent=titles[view];
    const ta=document.getElementById('topbar-actions');
    ta.innerHTML='';
    const c=document.getElementById('view-container');
    if      (view==='dashboard')    { c.innerHTML=renderDashboard(); }
    else if (view==='agencies')     { c.innerHTML=renderAgencies();     ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddAgency()"><i class="fa-solid fa-plus"></i> Add Agency</button>`; }
    else if (view==='clients')      { c.innerHTML=renderClients();      ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddClient()"><i class="fa-solid fa-plus"></i> Add Client</button>`; }
    else if (view==='properties')   { c.innerHTML=renderProperties();   ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddProperty()"><i class="fa-solid fa-plus"></i> Add Property</button>`; }
    else if (view==='units')        { c.innerHTML=renderUnits();        ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddUnit()"><i class="fa-solid fa-plus"></i> Add Unit</button> <button class="btn-primary-custom bg-master" onclick="openUnitsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Units Upload</button>`; }
    else if (view==='tenants')      { c.innerHTML=renderTenants();      ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddTenant()"><i class="fa-solid fa-plus"></i> Add Tenant</button> <button class="btn-primary-custom bg-master" onclick="openTenantsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Tenants Upload</button>`; }
    else if (view==='transactions') { c.innerHTML=renderTransactions(); ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openPostTx()"><i class="fa-solid fa-plus"></i> Post Transaction</button><button class="btn-primary-custom" style="background:#1a6b3c;margin-left:8px" onclick="openBulkPostTx()"><i class="fa-solid fa-layer-group"></i> Bulk Posting</button><button class="btn-primary-custom" style="background:#555;margin-left:8px" onclick="openResetModal()"><i class="fa-solid fa-rotate"></i> Reset Data</button>`; }
  }

  function renderDashboard() {
    const ag=A(),cl=C(),pr=P(),un=U(),te=T(),tx=TX();
    const occupied=un.filter(u=>u.UnitStatus==='Occupied').length;
    const activeTen=te.filter(t=>t.Active==='Y').length;
    const totalBal=tx.reduce((s,t)=>s+Number(t.Amount),0);
    const pendingTx=tx.filter(t=>t.Authenticated==='N').length;
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
    const monthlyTx=tx.filter(t=>new Date(t.Date)>=cutoff&&Number(t.Amount)>0);
    const monthlyRev=monthlyTx.reduce((s,t)=>s+Number(t.Amount),0);

    return `
    <div class="overview-grid">
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#d62828,#9b0000)"><i class="fa-solid fa-landmark"></i></div><div class="stat-info"><div class="stat-val">${ag.length}</div><div class="stat-lbl">Agencies</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#7209b7,#480088)"><i class="fa-solid fa-user-tie"></i></div><div class="stat-info"><div class="stat-val">${cl.length}</div><div class="stat-lbl">Clients</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#2d9b59,#1a6b3c)"><i class="fa-solid fa-building"></i></div><div class="stat-info"><div class="stat-val">${pr.length}</div><div class="stat-lbl">Properties</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#4361ee,#3a0ca3)"><i class="fa-solid fa-door-open"></i></div><div class="stat-info"><div class="stat-val">${occupied}/${un.length}</div><div class="stat-lbl">Occupied/Total Units</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#f7971e,#c95a00)"><i class="fa-solid fa-users"></i></div><div class="stat-info"><div class="stat-val">${activeTen}</div><div class="stat-lbl">Active Tenants</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#11998e,#076e65)"><i class="fa-solid fa-dollar-sign"></i></div><div class="stat-info"><div class="stat-val">${fmtMoney(monthlyRev)}</div><div class="stat-lbl">Revenue (30 days)</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#d62828,#9b0000)"><i class="fa-solid fa-clock"></i></div><div class="stat-info"><div class="stat-val">${pendingTx}</div><div class="stat-lbl">Pending Transactions</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#1a1a2e,#16213e)"><i class="fa-solid fa-scale-balanced"></i></div><div class="stat-info"><div class="stat-val">${fmtMoney(totalBal)}</div><div class="stat-lbl">Total Balance</div></div></div>
    </div>
    <div class="dash-three-col" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;">
      <div class="table-card">
        <div class="table-card-header"><h5>Agencies</h5></div>
        <div class="table-responsive"><table class="data-table">
          <thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Status</th></tr></thead>
          <tbody>${ag.map(a=>`<tr><td style="font-family:monospace">${a.AgencyCode}</td><td>${a.AgencyName}</td><td><span class="pill ${a.Master==='Y'?'pill-master':'pill-agency'}">${a.Master==='Y'?'Master':'Agency'}</span></td><td><span class="badge-${a.Active==='Y'?'active':'inactive'}">${a.Active==='Y'?'Active':'Inactive'}</span></td></tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="table-card">
        <div class="table-card-header"><h5>Properties by Type</h5></div>
        <div style="padding:16px;">
          ${['Apartment','Villa','Loft','Condo','House','Suite','Commercial'].map(type=>{
            const cnt=pr.filter(p=>p.PropertyType===type).length;
            if(!cnt) return '';
            return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:.875rem;"><span>${type}</span><strong>${cnt}</strong></div>`;
          }).join('')}
        </div>
      </div>
      <div class="table-card">
        <div class="table-card-header"><h5>Recent Activity</h5></div>
        <div style="padding:6px 16px;">
          ${tx.slice(0,6).map(t=>{
            const ten=DB.findOne('tenants',{TenantID:t.TenantID})||{};
            const credit=Number(t.Amount)>=0;
            return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;">
              <div style="width:32px;height:32px;border-radius:8px;background:${credit?'#d4f5e2':'#fde8e8'};display:flex;align-items:center;justify-content:center;color:${credit?'#1a6b3c':'#9b0000'};font-size:.8rem;flex-shrink:0">
                <i class="fa-solid fa-${credit?'arrow-down':'arrow-up'}"></i></div>
              <div style="flex:1">
                <div style="font-size:.8rem;font-weight:600">${ten.FirstName||''} ${ten.LastName||''}</div>
                <div style="font-size:.73rem;color:#aaa">${t.Description}</div>
              </div>
              <div style="font-weight:700;font-size:.85rem;color:${credit?'#2d9b59':'#d62828'}">${credit?'+':''}${fmtMoney(t.Amount)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  function agencyHasTx(agencyCode) {
    const propCodes = DB.find('properties', {AgencyCode: agencyCode}).map(p => p.PropertyCode);
    return DB.getAll('transactions').some(tx => propCodes.includes(tx.PropertyCode));
  }

  function deleteAgency(code, name) {
    if (!confirm('Delete agency "' + name + '"? This cannot be undone.')) return;
    DB.remove('agencies', 'AgencyCode', code);
    showView('agencies', document.querySelector('[data-view="agencies"]'));
    toast(name + ' deleted.', 'info');
  }

  function renderAgencies() {
    return `<div class="table-card">
    <div class="table-card-header"><h5>All Agencies (${A().length})</h5></div>
    <div class="filter-bar"><i class="fa-solid fa-magnifying-glass" style="color:#aaa"></i><input id="filter-agencies" placeholder="Search agencies..." oninput="filterTable('filter-agencies','tbl-agencies')"></div>
    <div class="table-responsive"><table class="data-table" id="tbl-agencies">
      <thead><tr><th>Code</th><th>Name</th><th>Address</th><th>Phone</th><th>Email</th><th>Type</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${A().map(a=>{
        const canDel = a.Active !== 'Y' && !agencyHasTx(a.AgencyCode);
        return `<tr>
        <td style="font-family:monospace">${a.AgencyCode}</td>
        <td><strong>${a.AgencyName}</strong></td>
        <td style="font-size:.8rem">${a.Address}</td>
        <td>${a.Telephone}</td><td>${a.Email}</td>
        <td><span class="pill ${a.Master==='Y'?'pill-master':'pill-agency'}">${a.Master==='Y'?'Master':'Agency'}</span></td>
        <td><span class="badge-${a.Active==='Y'?'active':'inactive'}">${a.Active==='Y'?'Active':'Inactive'}</span></td>
        <td>
          <button class="btn-edit" onclick="openEditAgency('${a.AgencyCode}')"><i class="fa-solid fa-pen"></i></button>
          ${canDel?`<button class="btn-del" onclick="deleteAgency('${a.AgencyCode}','${a.AgencyName.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button>`:''}
        </td>
      </tr>`;}).join('')}</tbody>
    </table></div></div>`;
  }

  function renderClients() {
    return `<div class="table-card">
    <div class="table-card-header"><h5>All Clients (${C().length})</h5></div>
    <div class="filter-bar"><i class="fa-solid fa-magnifying-glass" style="color:#aaa"></i><input id="filter-clients" placeholder="Search clients..." oninput="filterTable('filter-clients','tbl-clients')"></div>
    <div class="table-responsive"><table class="data-table" id="tbl-clients">
      <thead><tr><th>Code</th><th>Name</th><th>Agency</th><th>Phone</th><th>Email</th><th>Since</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${C().map(c=>{
        const ag=DB.findOne('agencies',{AgencyCode:c.AgencyCode})||{};
        return`<tr>
          <td style="font-family:monospace">${c.ClientCode}</td>
          <td><strong>${c.ClientName}</strong></td>
          <td>${ag.AgencyName||c.AgencyCode}</td>
          <td>${c.Telephone}</td><td>${c.Email}</td>
          <td>${fmtDate(c.Date)}</td>
          <td><span class="badge-${c.Active==='Y'?'active':'inactive'}">${c.Active==='Y'?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditClient('${c.ClientCode}')"><i class="fa-solid fa-pen"></i></button>
            <button class="btn-del"  onclick="confirmDelete('clients','ClientCode','${c.ClientCode}','${c.ClientName.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
  }

  function renderProperties() {
    return `<div class="table-card">
    <div class="table-card-header"><h5>All Properties (${P().length})</h5></div>
    <div class="filter-bar"><i class="fa-solid fa-magnifying-glass" style="color:#aaa"></i><input id="filter-properties" placeholder="Search properties..." oninput="filterTable('filter-properties','tbl-properties')"></div>
    <div class="table-responsive"><table class="data-table" id="tbl-properties">
      <thead><tr><th>Code</th><th>Name</th><th>Agency</th><th>Client</th><th>City</th><th>Type</th><th>Utilities</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${P().map(p=>{
        const ag=DB.findOne('agencies',{AgencyCode:p.AgencyCode})||{};
        const cl=DB.findOne('clients',{ClientCode:p.ClientCode})||{};
        return`<tr>
          <td style="font-family:monospace">${p.PropertyCode}</td>
          <td><strong>${p.PropertyName}</strong><br><span class="text-muted-sm">${p.City}</span></td>
          <td>${ag.AgencyName||p.AgencyCode}</td>
          <td>${cl.ClientName||p.ClientCode}</td>
          <td>${p.City}, ${p.Country}</td>
          <td>${p.PropertyType}</td>
          <td><span class="badge-${p.Utilities==='Y'?'yes':'no'}">${p.Utilities==='Y'?'Yes':'No'}</span></td>
          <td><span class="badge-${p.Active==='Y'?'active':'inactive'}">${p.Active==='Y'?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn-edit"  onclick="openEditProperty('${p.PropertyCode}')"><i class="fa-solid fa-pen"></i></button>
            <button class="btn-del"   onclick="deleteProperty('${p.PropertyCode}','${p.PropertyName.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
  }

  function renderUnits() {
    return `<div class="table-card">
    <div class="table-card-header"><h5>All Units (${U().length})</h5></div>
    <div class="filter-bar"><i class="fa-solid fa-magnifying-glass" style="color:#aaa"></i><input id="filter-units" placeholder="Search units..." oninput="filterTable('filter-units','tbl-units')"></div>
    <div class="table-responsive"><table class="data-table" id="tbl-units">
      <thead><tr><th>Code</th><th>Property</th><th>Unit#</th><th>Bed/Bath/Floor</th><th>Rent</th><th>Deposit</th><th>Status</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${U().map(u=>{
        const p=DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
        return`<tr>
          <td style="font-family:monospace">${u.UnitCode}</td>
          <td>${p.PropertyName||u.PropertyCode}</td>
          <td><strong>${u.UnitNumber}</strong></td>
          <td>${u.Bedrooms}BR / ${u.Bathrooms}BA / Fl.${u.Floor}</td>
          <td>$${Number(u.RentAmount).toLocaleString()}</td>
          <td>$${Number(u.DepositAmount).toLocaleString()}</td>
          <td><span class="${u.UnitStatus==='Occupied'?'badge-occupied':'badge-vacant'}">${u.UnitStatus}</span></td>
          <td><span class="badge-${u.Active==='Y'?'active':'inactive'}">${u.Active==='Y'?'Yes':'No'}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditUnit('${u.UnitCode}')"><i class="fa-solid fa-pen"></i></button>
            <button class="btn-del"  onclick="deleteUnit('${u.UnitCode}','${u.UnitNumber}')"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
  }

  function deleteTenant(id, name) {
    const t = DB.findOne('tenants', {TenantID: id});
    if (t && t.Active === 'Y') {
      toast('Cannot delete "'+name+'" — deactivate the tenant first.','error'); return;
    }
    const hasTx = DB.getAll('transactions').some(tx => tx.TenantID === id);
    if (hasTx) {
      toast('Cannot delete "'+name+'" — tenant has linked transactions.','error'); return;
    }
    if (!confirm('Delete tenant "'+name+'"? This cannot be undone.')) return;
    if (t && t.UnitCode) DB.update('propunits','UnitCode',t.UnitCode,{UnitStatus:'Vacant'});
    DB.remove('tenants','TenantID',id);
    showView('tenants', document.querySelector('[data-view="tenants"]'));
    toast(name+' deleted.','info');
  }

  function renderTenants() {
    const sorted = T().slice().sort((a,b)=>{
      const pa=DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb=DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const ua=DB.findOne('propunits',{UnitCode:a.UnitCode})||{};
      const ub=DB.findOne('propunits',{UnitCode:b.UnitCode})||{};
      const pName = (pa.PropertyName||'').localeCompare(pb.PropertyName||'');
      if (pName !== 0) return pName;
      return (ua.UnitNumber||'').localeCompare(ub.UnitNumber||'');
    });

        return`<tr>
          <td style="font-size:.78rem;font-family:monospace">${t.TenantNumber}</td>
          <td><strong>${t.FirstName} ${t.LastName}</strong><br><span class="text-muted-sm">${t.Email}</span></td>

          <td>${p.PropertyName||'?'} / Unit ${u.UnitNumber||'?'}</td>

  function viewTxDetail(ref) {
    const tx = DB.getAll('transactions').find(t => t.transactionRef === ref);
    if (!tx) return;
    const hasDoc = tx.TransactionDocument && tx.TransactionDocument.length > 0;
    const preview = hasDoc
      ? (tx.TransactionDocument.startsWith('data:image')
          ? `<img src="${tx.TransactionDocument}" style="max-width:100%;border-radius:6px;margin-top:10px">`
          : `<iframe src="${tx.TransactionDocument}" style="width:100%;height:380px;border:none;border-radius:6px;margin-top:10px"></iframe>`)
      : '<p style="color:#aaa;margin-top:8px">No document attached.</p>';
    openModal('Transaction — '+ref,
      `<p style="margin:0 0 6px"><strong>Note:</strong> ${tx.TransactionNote||'—'}</p>
       <p style="margin:0 0 4px"><strong>Currency:</strong> ${tx.Currency||'—'}</p>
       ${hasDoc?`<p style="margin:0 0 4px"><a href="${tx.TransactionDocument}" download="doc-${ref}" target="_blank"><i class="fa-solid fa-file-arrow-down"></i> Download Document</a></p>`:''}
       ${preview}`,
      `<button class="btn-back" onclick="closeModal()">Close</button>`,true
    );
  }

  function renderTransactions() {
    const txs = DB.getAll('transactions').slice().sort((a,b)=>{
      const ta=DB.findOne('tenants',{TenantID:a.TenantID})||{};
      const tb=DB.findOne('tenants',{TenantID:b.TenantID})||{};
      const nameA=(ta.FirstName||'')+' '+(ta.LastName||'');
      const nameB=(tb.FirstName||'')+' '+(tb.LastName||'');
      const nc=nameA.localeCompare(nameB);
      if(nc!==0) return nc;
      return new Date(b.Date)-new Date(a.Date);
    });
    const bal=txs.reduce((s,t)=>s+Number(t.Amount),0);
    return `<div class="table-card"><div class="table-card-header"><h5>All Transactions (${txs.length})</h5><span>Total Balance: <strong style="color:${bal>=0?'#2d9b59':'#d62828'}">${fmtMoney(bal)}</strong></span></div>
    <div class="table-responsive"><table class="data-table">
      <thead><tr><th>Date</th><th>Tenant</th><th>Property</th><th>Description</th><th>Amount</th><th>Ref</th><th>Auth</th><th>Actions</th></tr></thead>
      <tbody>${txs.map(tx=>{
        const ten=DB.findOne('tenants',{TenantID:tx.TenantID})||{};
        const p=DB.findOne('properties',{PropertyCode:tx.PropertyCode})||{};
        const credit=Number(tx.Amount)>=0;
        const hasDetail = (tx.TransactionNote||tx.TransactionDocument);
        return`<tr>
          <td>${fmtDate(tx.Date)}</td>
          <td>${ten.FirstName||''} ${ten.LastName||''}</td>
          <td style="font-size:.8rem">${p.PropertyName||tx.PropertyCode}</td>
          <td>${tx.Description}</td>
          <td style="font-weight:600;color:${credit?'#2d9b59':'#d62828'}">${credit?'+':''}${fmtMoney(tx.Amount)}</td>
          <td style="font-size:.72rem;font-family:monospace">${hasDetail?`<a href="#" onclick="viewTxDetail('${tx.transactionRef}');return false;" style="color:#9b0000;text-decoration:underline">${tx.transactionRef}</a>`:tx.transactionRef}</td>
          <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'✓':'Pend'}</span></td>
          <td>
            <button class="btn-${tx.Authenticated==='Y'?'view':'edit'}" onclick="toggleAuth('${tx.transactionRef}')">${tx.Authenticated==='Y'?'Unverify':'Verify'}</button>
            <button class="btn-del" onclick="confirmDeleteTx('${tx.transactionRef}')"><i class="fa-solid fa-trash"></i></button>
          </td>
        </tr>`;
      }).join('')||'<tr><td colspan="8" style="text-align:center;padding:40px;color:#aaa">No transactions.</td></tr>'}</tbody>
    </table></div></div>`;
  }

  function toggleAuth(ref) {
    const all=DB.getAll('transactions');
    const idx=all.findIndex(t=>t.transactionRef===ref);
    if(idx===-1)return;
    all[idx].Authenticated=all[idx].Authenticated==='Y'?'N':'Y';
    DB.save('transactions',all);
    showView('transactions', document.querySelector('[data-view="transactions"]'));
    toast('Transaction auth toggled.','success');
  }

  // Delete transaction — only if NOT authenticated
  function confirmDeleteTx(ref) {
    const tx = DB.getAll('transactions').find(t => t.transactionRef === ref);
    if (tx && tx.Authenticated === 'Y') {
      toast('Cannot delete an authenticated transaction. Unverify it first.', 'error');
      return;
    }
    if (!confirm('Delete transaction ' + ref + '? This cannot be undone.')) return;
    const all = DB.getAll('transactions').filter(t => t.transactionRef !== ref);
    DB.save('transactions', all);
    showView('transactions', document.querySelector('[data-view="transactions"]'));
    toast('Transaction deleted.', 'info');
  }

  // Delete property — only if inactive and no transactions
  function deleteProperty(code, name) {
    const prop = DB.findOne('properties', {PropertyCode: code});
    if (prop && prop.Active === 'Y') {
      toast('Cannot delete "' + name + '" — deactivate it first.', 'error'); return;
    }
    const hasTx = DB.getAll('transactions').some(tx => tx.PropertyCode === code);
    if (hasTx) {
      toast('Cannot delete "' + name + '" — it has linked transactions.', 'error'); return;
    }
    if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
    DB.remove('properties', 'PropertyCode', code);
    showView('properties', document.querySelector('[data-view="properties"]'));
    toast(name + ' deleted.', 'info');
  }

  // Delete unit — blocked if occupied
  function deleteUnit(code, unitNum) {
    const unit = DB.findOne('propunits', {UnitCode: code});
    if (unit && unit.UnitStatus === 'Occupied') {
      toast('Cannot delete Unit ' + unitNum + ' — it is currently occupied.', 'error');
      return;
    }
    if (!confirm('Delete "Unit ' + unitNum + '"? This cannot be undone.')) return;
    DB.remove('propunits', 'UnitCode', code);
    showView('units', document.querySelector('[data-view="units"]'));
    toast('Unit ' + unitNum + ' deleted.', 'info');
  }

  function confirmDelete(table, key, value, label) {
    if(!confirm(`Delete "${label}"? This cannot be undone.`))return;
    DB.remove(table,key,value);
    const activeBtn = document.querySelector('.nav-link-btn.active');
    if(activeBtn) showView(activeBtn.dataset.view, activeBtn);
    toast(label+' deleted.','info');
  }

  function downloadUnitTemplate() {

    const ws = XLSX.utils.aoa_to_sheet([
      ['PropertyCode','UnitNumber','RentAmount','DepositAmount','Bedrooms','Bathrooms','Floor','UnitStatus'],
      ['PR001','101','1200.00','2400.00','2','1','1','Vacant'],
      ['PR001','102','1100.00','2200.00','1','1','2','Vacant']
    ]);
    ws['!cols'] = [{wch:14},{wch:12},{wch:12},{wch:14},{wch:10},{wch:10},{wch:8},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Units');

  function previewUnitsUpload() {
    const file = document.getElementById('uu-file').files[0];
    if (!file) return;
    document.getElementById('uu-preview').innerHTML = '<div style="padding:10px;font-size:.84rem;color:#888"><i class="fa-solid fa-spinner fa-spin"></i> Reading file…</div>';
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:'', raw:false});
        window._unitUploadRows = rows;
        renderUnitsPreview(rows);
      } catch(err) {
        document.getElementById('uu-preview').innerHTML = `<div style="color:#d62828;padding:10px;font-size:.85rem"><i class="fa-solid fa-triangle-exclamation"></i> Error: ${err.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function renderUnitsPreview(rows) {
    const allPropCodes = P().map(p => p.PropertyCode);
    const seen = {};
    let validCount = 0;
    const rowData = rows.map((row) => {
      const errors = [];
      const propCode = String(row.PropertyCode||'').trim();
      const unitNum  = String(row.UnitNumber||'').trim();
      if (!propCode) errors.push('PropertyCode required');
      else if (!allPropCodes.includes(propCode)) errors.push('PropertyCode not found');
      if (!unitNum) errors.push('UnitNumber required');
      else if (propCode && allPropCodes.includes(propCode)) {
        if (DB.find('propunits',{PropertyCode:propCode}).some(u=>String(u.UnitNumber)===unitNum)) errors.push('Unit already exists');
        const bk = propCode+'|'+unitNum;
        if (seen[bk]) errors.push('Duplicate in file'); else seen[bk]=true;
      }
      if (row.RentAmount===''    || isNaN(Number(row.RentAmount)))    errors.push('Invalid RentAmount');
      if (row.DepositAmount==='' || isNaN(Number(row.DepositAmount))) errors.push('Invalid DepositAmount');
      if (row.Bedrooms===''      || isNaN(Number(row.Bedrooms)))      errors.push('Invalid Bedrooms');
      if (row.Bathrooms===''     || isNaN(Number(row.Bathrooms)))     errors.push('Invalid Bathrooms');
      if (row.Floor===''         || isNaN(Number(row.Floor)))         errors.push('Invalid Floor');
      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, propCode, unitNum, valid, errors};
    });
    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length-validCount} errors</strong></div>`;
    html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:.76rem"><thead><tr><th>#</th><th>PropertyCode</th><th>UnitNumber</th><th>Rent</th><th>Deposit</th><th>Bed</th><th>Bath</th><th>Floor</th><th>Status</th><th>Validation</th></tr></thead><tbody>`;
    rowData.forEach(({row,propCode,unitNum,valid,errors},i) => {
      html += `<tr style="background:${valid?'':'#fff5f5'}"><td>${i+1}</td><td style="font-family:monospace">${propCode}</td><td>${unitNum}</td><td>${row.RentAmount}</td><td>${row.DepositAmount}</td><td>${row.Bedrooms}</td><td>${row.Bathrooms}</td><td>${row.Floor}</td><td>${String(row.UnitStatus||'Vacant')}</td><td style="color:${valid?'#2d9b59':'#d62828'};font-size:.78rem">${valid?'<i class="fa-solid fa-check"></i> OK':errors.join('; ')}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    if (rows.length-validCount>0) html += `<div style="font-size:.78rem;color:#888;margin-top:6px"><i class="fa-solid fa-circle-info"></i> Only valid rows will be imported.</div>`;
    document.getElementById('uu-preview').innerHTML = html;
    const btn = document.getElementById('uu-save-btn');
    if (btn) { btn.style.display = validCount>0?'':'none'; btn.innerHTML=`<i class="fa-solid fa-upload"></i> Import ${validCount} Unit(s)`; }
    window._unitUploadRowData = rowData;
  }

  function saveUnitsUpload() {
    const rowData = window._unitUploadRowData||[];
    const seen = {};
    let count = 0;
    rowData.forEach(({row,propCode,unitNum,valid}) => {
      if (!valid) return;
      const bk = propCode+'|'+unitNum;
      if (seen[bk]) return; seen[bk]=true;
      const code = DB.nextCode('propunits','UnitCode','UN');
      DB.insert('propunits',{
        UnitCode:code, PropertyCode:propCode, UnitNumber:unitNum,
        RentAmount:parseFloat(row.RentAmount)||0, DepositAmount:parseFloat(row.DepositAmount)||0,
        UnitStatus:String(row.UnitStatus||'Vacant'),
        Bedrooms:parseInt(row.Bedrooms)||1, Bathrooms:parseInt(row.Bathrooms)||1, Floor:parseInt(row.Floor)||1,
        Date:new Date().toISOString().split('T')[0], Note:'', Active:'Y'
      });
      count++;
    });
    closeModal();
    showView('units', document.querySelector('[data-view="units"]'));
    toast(`${count} unit(s) imported successfully!`,'success');
  }

  function fillRentDeposit() {
    const sel = document.getElementById('at-unit');

    if (opt && opt.dataset.rent !== undefined) {

    } else {

    }

  function readFile(file) {
    return new Promise(resolve => {
      if (!file) { resolve(''); return; }
      const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file);
    });
  }

    const first   = document.getElementById('at-first').value.trim();

    if (!first||!last||!idnum||!tel||!email||!unitCode||!movein) {
      toast('All required fields must be filled.','error'); return;

      toast('No vacant unit selected.','error'); return;
    }
    const [photo, idcopy, agrmt] = await Promise.all([
      readFile(document.getElementById('at-photo').files[0]),

    ]);
    const id  = DB.nextCode('tenants','TenantID','T');

  function mNormDate(val) {
    const s = String(val||'').trim();
    if (!s) return '';
    const d = new Date(s);
    return isNaN(d.getTime()) ? s : d.toISOString().split('T')[0];
  }

  function renderTenantsPreview(rows) {
    const allPropCodes = P().map(p => p.PropertyCode);
    const FREQ = ['Monthly','Quarterly','SemiAnnually','Annually'];
    let validCount = 0;
    const rowData = rows.map((row) => {
      const errors = [];
      const propCode = String(row.PropertyCode||'').trim();
      const unitNum  = String(row.UnitNumber||'').trim();
      if (!String(row.FirstName||'').trim()) errors.push('FirstName required');
      if (!String(row.LastName||'').trim())  errors.push('LastName required');
      if (!String(row.IDNumber||'').trim())  errors.push('IDNumber required');
      if (!String(row.Telephone||'').trim()) errors.push('Telephone required');
      if (!String(row.Email||'').trim())     errors.push('Email required');
      if (!propCode) errors.push('PropertyCode required');
      else if (!allPropCodes.includes(propCode)) errors.push('PropertyCode not found');
      let resolvedUnitCode = '', resolvedRent = 0, resolvedDep = 0;
      if (!unitNum) errors.push('UnitNumber required');
      else if (propCode && allPropCodes.includes(propCode)) {
        const unit = DB.find('propunits',{PropertyCode:propCode}).find(u=>String(u.UnitNumber)===unitNum);
        if (!unit) errors.push(`Unit ${unitNum} not found in ${propCode}`);
        else if (unit.UnitStatus==='Occupied') errors.push(`Unit ${unitNum} is already Occupied`);
        else { resolvedUnitCode=unit.UnitCode; resolvedRent=Number(unit.RentAmount); resolvedDep=Number(unit.DepositAmount); }
      }
      const freq = String(row.RentFrequency||'').trim();
      if (!freq) errors.push('RentFrequency required');
      else if (!FREQ.includes(freq)) errors.push(`RentFrequency: ${FREQ.join(' | ')}`);
      const nd = mNormDate(row.MoveInDate);
      if (!nd) errors.push('MoveInDate required');
      else if (isNaN(Date.parse(nd))) errors.push('Invalid MoveInDate');
      const effectiveRent = (row.RentAmount!=='' && !isNaN(Number(row.RentAmount))) ? parseFloat(row.RentAmount) : resolvedRent;
      const effectiveDep  = (row.DepositAmount!=='' && !isNaN(Number(row.DepositAmount))) ? parseFloat(row.DepositAmount) : resolvedDep;
      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, propCode, unitNum, resolvedUnitCode, effectiveRent, effectiveDep, normDate:nd, valid, errors};
    });
    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length-validCount} errors</strong></div>`;
    html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:.76rem"><thead><tr><th>#</th><th>Name</th><th>ID Number</th><th>Email</th><th>PropertyCode</th><th>Unit</th><th>Rent</th><th>Freq</th><th>Move-in</th><th>Validation</th></tr></thead><tbody>`;
    rowData.forEach(({row,propCode,unitNum,normDate:nd,effectiveRent,valid,errors},i) => {
      html += `<tr style="background:${valid?'':'#fff5f5'}"><td>${i+1}</td><td><strong>${String(row.FirstName||'')} ${String(row.LastName||'')}</strong></td><td style="font-family:monospace;font-size:.74rem">${row.IDNumber||''}</td><td style="font-size:.74rem">${row.Email||''}</td><td style="font-family:monospace">${propCode}</td><td>${unitNum}</td><td>${fmtMoney(effectiveRent)}</td><td>${row.RentFrequency||''}</td><td>${nd||row.MoveInDate||''}</td><td style="color:${valid?'#2d9b59':'#d62828'};font-size:.78rem;min-width:140px">${valid?'<i class="fa-solid fa-check"></i> OK':errors.join('; ')}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    if (rows.length-validCount>0) html += `<div style="font-size:.78rem;color:#888;margin-top:6px"><i class="fa-solid fa-circle-info"></i> Only valid rows imported. Units will be marked Occupied. Photos/documents can be attached via Edit Tenant.</div>`;
    document.getElementById('tu-preview').innerHTML = html;
    const btn = document.getElementById('tu-save-btn');
    if (btn) { btn.style.display = validCount>0?'':'none'; btn.innerHTML=`<i class="fa-solid fa-upload"></i> Import ${validCount} Tenant(s)`; }
    window._tenantUploadRowData = rowData;
  }

    let count = 0;
    checked.forEach(cb => {
      DB.insert('transactions', {
        Date: date, TenantID: cb.value, Authenticated: auth,
        PropertyCode: cb.dataset.prop, Description: desc,
        Amount: parseFloat(cb.dataset.amt)||0, Currency: curr,
        TransactionNote: note, TransactionDocument: '',
        transactionRef: DB.nextTxRef()
      });
      count++;
    });
    closeModal();
    showView('transactions', document.querySelector('[data-view="transactions"]'));
    toast(count + ' rent transaction' + (count>1?'s':'') + ' posted successfully!', 'success');
  }

  function openResetModal() {
    if(!confirm('RESET ALL DATA to defaults? This will erase everything and reload sample data. Continue?'))return;
    DB.reset();
    toast('Data has been reset to defaults.','info');
    showView('dashboard', document.querySelector('[data-view="dashboard"]'));
  }

  function toast(msg,type='info') {
    const c=document.getElementById('toast-container');
    const d=document.createElement('div');
    d.className=`toast-msg toast-${type}`;d.textContent=msg;
    c.appendChild(d);setTimeout(()=>d.remove(),4000);
  }

  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  showView('dashboard', document.querySelector('[data-view="dashboard"]'));
</script>
</body>
</html>
