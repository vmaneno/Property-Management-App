<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Admin — Property Management</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <script>(function(){const t=localStorage.getItem('pma_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .overview-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
    .search-bar input,.search-bar select { min-width:160px; }
    .pill { display:inline-block;padding:2px 9px;border-radius:12px;font-size:.73rem;font-weight:600; }
    .pill-master { background:#ffe5e5;color:#9b0000; }
    .pill-agency { background:#f3e8ff;color:#480088; }
    .filter-bar { display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #f0f0f0; }
    .filter-bar input { max-width:280px;padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:.85rem; }
    .filter-bar input:focus { outline:none;border-color:#9b0000; }
    .rpt-tab-bar { display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap; }
    .rpt-tab { padding:6px 14px;border:1px solid #ddd;border-radius:20px;cursor:pointer;font-size:.82rem;background:#f9f9f9; }
    .rpt-tab.active { background:#9b0000;color:#fff;border-color:#9b0000; }
    .rpt-controls-area { margin-bottom:16px; }
    .rpt-print-btn { margin-top:14px; }
    .unit-status-btn { padding:5px 14px;border:1px solid #ddd;border-radius:16px;cursor:pointer;font-size:.8rem;background:#f9f9f9;font-weight:600;color:#666;transition:all .15s; }
    .unit-status-btn:hover { border-color:#9b0000;color:#9b0000; }
    .unit-status-btn.uf-active { background:#9b0000;color:#fff;border-color:#9b0000; }
    .unit-group { border-bottom:1px solid #f0f0f0; }
    .unit-group:last-child { border-bottom:none; }
    .unit-group-hdr { display:flex;align-items:center;justify-content:space-between;padding:13px 20px;cursor:pointer;background:#fafafa;border-bottom:1px solid #f0f0f0;transition:background .15s;gap:12px;flex-wrap:wrap; }
    .unit-group-hdr:hover { background:#fff5f5; }
    .unit-count-pill { background:#ffe5e5;color:#9b0000;border-radius:10px;padding:2px 9px;font-size:.72rem;font-weight:700; }
    .unit-grp-body .table-responsive { margin:0; }
    .unit-grp-body .data-table { border-radius:0; }
    .tenant-group-hdr { display:flex;align-items:center;justify-content:space-between;padding:13px 20px;cursor:pointer;background:#fafafa;border-bottom:1px solid #f0f0f0;transition:background .15s;gap:12px;flex-wrap:wrap; }
    .tenant-group-hdr:hover { background:#fff5f5; }
    .tenant-count-pill { background:#ffe5e5;color:#9b0000;border-radius:10px;padding:2px 9px;font-size:.72rem;font-weight:700; }
    .tenant-grp-body .table-responsive { margin:0; }
    .tenant-grp-body .data-table { border-radius:0; }
    @media print {
      .sidebar,.topbar,.rpt-controls-area,.rpt-tab-bar,.rpt-print-btn { display:none!important; }
      .main-content { margin:0!important;padding:0!important; }
      .table-card { box-shadow:none!important;border:none!important; }
      body { background:#fff!important; }
    }
  </style>
</head>
<body>
<div class="dash-wrap">
  <aside class="sidebar sidebar-master">
    <div class="sidebar-brand">
      <div class="app-name">Property Management</div>
      <div class="role-name"><i class="fa-solid fa-shield-halved"></i> Master Admin</div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">M</div>
      <div>
        <div class="user-name"  id="sb-name">Master</div>
        <div class="user-role" id="sb-code">—</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <ul style="padding:0;margin:0;">
        <li class="nav-item"><button class="nav-link-btn active" data-view="dashboard"    onclick="showView('dashboard',this)"><i class="fa-solid fa-gauge-high"></i> Dashboard</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="agencies"      onclick="showView('agencies',this)"><i class="fa-solid fa-landmark"></i> Agencies</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="clients"       onclick="showView('clients',this)"><i class="fa-solid fa-user-tie"></i> Clients</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="properties"    onclick="showView('properties',this)"><i class="fa-solid fa-building"></i> Properties</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="units"         onclick="showView('units',this)"><i class="fa-solid fa-door-open"></i> Units</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="tenants"       onclick="showView('tenants',this)"><i class="fa-solid fa-users"></i> Tenants</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="transactions"  onclick="showView('transactions',this)"><i class="fa-solid fa-money-bill-transfer"></i> Transactions</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="profile"       onclick="showView('profile',this)"><i class="fa-solid fa-circle-user"></i> My Profile</button></li>
        <li class="nav-item"><button class="nav-link-btn" data-view="reports"       onclick="showView('reports',this)"><i class="fa-solid fa-print"></i> Print Reports</button></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
      <h2 id="page-title">Master Dashboard</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle dark / light mode"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
    </div>
    <div class="page-content" id="view-container"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="toast-container" id="toast-container"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box modal-box-lg" id="modal-box">
    <div class="modal-hdr bg-master" id="modal-hdr">
      <h5 id="modal-title">Form</h5>
      <button class="btn-close-modal" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body-pad" id="modal-body"></div>
    <div class="modal-footer-pad" id="modal-footer"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/api.js"></script>
<script>
  DB.init();

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('pma_theme', next);
    document.getElementById('theme-icon').className = next === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  (function(){ const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; const i = document.getElementById('theme-icon'); if(i) i.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon'; })();

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  document.querySelectorAll('.nav-link-btn').forEach(btn => {
    btn.addEventListener('click', () => { if (window.innerWidth <= 768) toggleSidebar(); });
  });

  const sess = JSON.parse(sessionStorage.getItem('pma_session') || 'null');
  if (!sess || sess.role !== 'master') { window.location.href = 'index.html'; }

  let masterAgency = DB.findOne('agencies', { AgencyCode: sess.id, Master: 'Y' })
                  || DB.findOne('agencies', { AgencyCode: sess.id });
  if (!masterAgency) { window.location.href = 'index.html'; }

  document.getElementById('sb-avatar').textContent = (masterAgency.AgencyName||'M')[0].toUpperCase();
  document.getElementById('sb-name').textContent   = masterAgency.AgencyName || 'Master';
  document.getElementById('sb-code').textContent   = 'Master — ' + (masterAgency.AgencyCode || sess.id);

  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  function fmtDate(d)  { return d ? new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '—'; }
  function fmtMoney(n) { const abs=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2}); return (n<0?'-':'')+'$'+abs; }

  // All data — master sees everything
  const A = () => DB.getAll('agencies');
  const C = () => DB.getAll('clients');
  const P = () => DB.getAll('properties');
  const U = () => DB.getAll('propunits');
  const T = () => DB.getAll('tenants');
  const TX= () => DB.getAll('transactions').sort((a,b)=>new Date(b.Date)-new Date(a.Date));

  // ── FILTER ─────────────────────────────────────────────
  function filterTable(inputId, tableId) {
    const q = document.getElementById(inputId).value.toLowerCase();
    document.querySelectorAll('#' + tableId + ' tbody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  function showView(view, btn) {
    document.querySelectorAll('.nav-link-btn').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const titles={dashboard:'Master Dashboard',agencies:'Agencies',clients:'All Clients',properties:'All Properties',units:'All Units',tenants:'All Tenants',transactions:'All Transactions',profile:'My Profile',reports:'Print Reports'};
    document.getElementById('page-title').textContent=titles[view]||view;
    const ta=document.getElementById('topbar-actions');
    ta.innerHTML='';
    const c=document.getElementById('view-container');
    if      (view==='dashboard')    { c.innerHTML=renderDashboard(); }
    else if (view==='agencies')     { c.innerHTML=renderAgencies();     ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddAgency()"><i class="fa-solid fa-plus"></i> Add Agency</button>`; }
    else if (view==='clients')      { c.innerHTML=renderClients();      ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddClient()"><i class="fa-solid fa-plus"></i> Add Client</button>`; }
    else if (view==='properties')   { c.innerHTML=renderProperties();   ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddProperty()"><i class="fa-solid fa-plus"></i> Add Property</button>`; }
    else if (view==='units')        { c.innerHTML=renderUnits(); buildUnitGroups(); ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddUnit()"><i class="fa-solid fa-plus"></i> Add Unit</button> <button class="btn-primary-custom bg-master" onclick="openUnitsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Units Upload</button>`; }
    else if (view==='tenants')      { c.innerHTML=renderTenants(); buildTenantGroups(); ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openAddTenant()"><i class="fa-solid fa-plus"></i> Add Tenant</button> <button class="btn-primary-custom bg-master" onclick="openTenantsUpload()" style="margin-left:8px"><i class="fa-solid fa-file-arrow-up"></i> Tenants Upload</button>`; }
    else if (view==='transactions') { c.innerHTML=renderTransactions(); filterTxView(); ta.innerHTML=`<button class="btn-primary-custom bg-master" onclick="openPostTx()"><i class="fa-solid fa-plus"></i> Post Transaction</button><button class="btn-primary-custom" style="background:#1a6b3c;margin-left:8px" onclick="openBulkPostTx()"><i class="fa-solid fa-layer-group"></i> Bulk Posting</button>`; }
    else if (view==='profile')      { c.innerHTML=renderProfile(); }
    else if (view==='reports')      { c.innerHTML=renderReports(); }
  }

  function renderDashboard() {
    const ag=A(),cl=C(),pr=P(),un=U(),te=T(),tx=TX();
    const occupied=un.filter(u=>u.UnitStatus==='Occupied').length;
    const activeTen=te.filter(t=>t.Active==='Y').length;
    const totalBal=tx.reduce((s,t)=>s+Number(t.Amount),0);
    const pendingTx=tx.filter(t=>t.Authenticated==='N').length;
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
    const monthlyTx=tx.filter(t=>new Date(t.Date)>=cutoff&&Number(t.Amount)>0);
    const monthlyRev=monthlyTx.reduce((s,t)=>s+Number(t.Amount),0);

    return `
    <div class="overview-grid">
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#d62828,#9b0000)"><i class="fa-solid fa-landmark"></i></div><div class="stat-info"><div class="stat-val">${ag.length}</div><div class="stat-lbl">Agencies</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#7209b7,#480088)"><i class="fa-solid fa-user-tie"></i></div><div class="stat-info"><div class="stat-val">${cl.length}</div><div class="stat-lbl">Clients</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#2d9b59,#1a6b3c)"><i class="fa-solid fa-building"></i></div><div class="stat-info"><div class="stat-val">${pr.length}</div><div class="stat-lbl">Properties</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#4361ee,#3a0ca3)"><i class="fa-solid fa-door-open"></i></div><div class="stat-info"><div class="stat-val">${occupied}/${un.length}</div><div class="stat-lbl">Occupied/Total Units</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#f7971e,#c95a00)"><i class="fa-solid fa-users"></i></div><div class="stat-info"><div class="stat-val">${activeTen}</div><div class="stat-lbl">Active Tenants</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#11998e,#076e65)"><i class="fa-solid fa-dollar-sign"></i></div><div class="stat-info"><div class="stat-val">${fmtMoney(monthlyRev)}</div><div class="stat-lbl">Revenue (30 days)</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#d62828,#9b0000)"><i class="fa-solid fa-clock"></i></div><div class="stat-info"><div class="stat-val">${pendingTx}</div><div class="stat-lbl">Pending Transactions</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:linear-gradient(135deg,#1a1a2e,#16213e)"><i class="fa-solid fa-scale-balanced"></i></div><div class="stat-info"><div class="stat-val">${fmtMoney(totalBal)}</div><div class="stat-lbl">Total Balance</div></div></div>
    </div>
    <div class="dash-three-col" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;">
      <div class="table-card">
        <div class="table-card-header"><h5>Agencies</h5></div>
        <div class="table-responsive"><table class="data-table">
          <thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Status</th></tr></thead>
          <tbody>${ag.map(a=>`<tr><td style="font-family:monospace">${a.AgencyCode}</td><td>${a.AgencyName}</td><td><span class="pill ${a.Master==='Y'?'pill-master':'pill-agency'}">${a.Master==='Y'?'Master':'Agency'}</span></td><td><span class="badge-${a.Active==='Y'?'active':'inactive'}">${a.Active==='Y'?'Active':'Inactive'}</span></td></tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="table-card">
        <div class="table-card-header"><h5>Properties by Type</h5></div>
        <div style="padding:16px;">
          ${['Apartment','Villa','Loft','Condo','House','Suite','Commercial'].map(type=>{
            const cnt=pr.filter(p=>p.PropertyType===type).length;
            if(!cnt) return '';
            return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:.875rem;"><span>${type}</span><strong>${cnt}</strong></div>`;
          }).join('')}
        </div>
      </div>
      <div class="table-card">
        <div class="table-card-header" style="flex-wrap:wrap;gap:8px;">
          <h5>Recent Activity</h5>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <select id="dash-client-filter" class="form-control-sm2" style="min-width:130px;font-size:.8rem;padding:4px 8px;" onchange="filterDashTx()">
              <option value="">All Clients</option>
              ${C().map(cl=>`<option value="${cl.ClientCode}">${cl.ClientName}</option>`).join('')}
            </select>
            <select id="dash-prop-filter" class="form-control-sm2" style="min-width:130px;font-size:.8rem;padding:4px 8px;" onchange="filterDashTx()">
              <option value="">All Properties</option>
              ${P().map(p=>`<option value="${p.PropertyCode}">${p.PropertyName}</option>`).join('')}
            </select>
          </div>
        </div>
        <div id="dash-activity-list" style="padding:6px 16px;">
          ${tx.slice(0,6).map(t=>{
            const ten=DB.findOne('tenants',{TenantID:t.TenantID})||{};
            const credit=Number(t.Amount)>=0;
            return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;">
              <div style="width:32px;height:32px;border-radius:8px;background:${credit?'#d4f5e2':'#fde8e8'};display:flex;align-items:center;justify-content:center;color:${credit?'#1a6b3c':'#9b0000'};font-size:.8rem;flex-shrink:0">
                <i class="fa-solid fa-${credit?'arrow-down':'arrow-up'}"></i></div>
              <div style="flex:1">
                <div style="font-size:.8rem;font-weight:600">${ten.FirstName||''} ${ten.LastName||''}</div>
                <div style="font-size:.73rem;color:#aaa">${t.Description}</div>
              </div>
              <div style="font-weight:700;font-size:.85rem;color:${credit?'#2d9b59':'#d62828'}">${credit?'+':''}${fmtMoney(t.Amount)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  function filterDashTx() {
    const clientCode = document.getElementById('dash-client-filter').value;
    const propSel    = document.getElementById('dash-prop-filter');
    const prevProp   = propSel.value;
    const allProps   = P();
    const filteredProps = clientCode ? allProps.filter(p=>p.ClientCode===clientCode) : allProps;
    propSel.innerHTML = '<option value="">All Properties</option>' +
      filteredProps.map(p=>`<option value="${p.PropertyCode}" ${p.PropertyCode===prevProp?'selected':''}>${p.PropertyName}</option>`).join('');
    const propCode = propSel.value;
    let filtered = TX();
    if (clientCode) {
      const cpCodes = allProps.filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode);
      filtered = filtered.filter(tx=>cpCodes.includes(tx.PropertyCode));
    }
    if (propCode) filtered = filtered.filter(tx=>tx.PropertyCode===propCode);
    const el = document.getElementById('dash-activity-list');
    if (!el) return;
    el.innerHTML = filtered.slice(0,6).map(t=>{
      const ten=DB.findOne('tenants',{TenantID:t.TenantID})||{};
      const credit=Number(t.Amount)>=0;
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;">
        <div style="width:32px;height:32px;border-radius:8px;background:${credit?'#d4f5e2':'#fde8e8'};display:flex;align-items:center;justify-content:center;color:${credit?'#1a6b3c':'#9b0000'};font-size:.8rem;flex-shrink:0">
          <i class="fa-solid fa-${credit?'arrow-down':'arrow-up'}"></i></div>
        <div style="flex:1">
          <div style="font-size:.8rem;font-weight:600">${ten.FirstName||''} ${ten.LastName||''}</div>
          <div style="font-size:.73rem;color:#aaa">${t.Description}</div>
        </div>
        <div style="font-weight:700;font-size:.85rem;color:${credit?'#2d9b59':'#d62828'}">${credit?'+':''}${fmtMoney(t.Amount)}</div>
      </div>`;
    }).join('') || '<div style="padding:20px;text-align:center;color:#aaa">No transactions.</div>';
  }

  function agencyHasTx(agencyCode) {
    const propCodes = DB.find('properties', {AgencyCode: agencyCode}).map(p => p.PropertyCode);
    return DB.getAll('transactions').some(tx => propCodes.includes(tx.PropertyCode));
  }

  function deleteAgency(code, name) {
    if (!confirm('Delete agency "' + name + '"? This cannot be undone.')) return;
    DB.remove('agencies', 'AgencyCode', code);
    showView('agencies', document.querySelector('[data-view="agencies"]'));
    toast(name + ' deleted.', 'info');
  }

  function renderAgencies() {
    return `<div class="table-card">
    <div class="table-card-header"><h5>All Agencies (${A().length})</h5></div>
    <div class="filter-bar"><i class="fa-solid fa-magnifying-glass" style="color:#aaa"></i><input id="filter-agencies" placeholder="Search agencies..." oninput="filterTable('filter-agencies','tbl-agencies')"></div>
    <div class="table-responsive"><table class="data-table" id="tbl-agencies">
      <thead><tr><th>Code</th><th>Name</th><th>Address</th><th>Phone</th><th>Email</th><th>Type</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${A().map(a=>{
        const canDel = a.Active !== 'Y' && !agencyHasTx(a.AgencyCode);
        return `<tr>
        <td style="font-family:monospace">${a.AgencyCode}</td>
        <td><strong>${a.AgencyName}</strong></td>
        <td style="font-size:.8rem">${a.Address}</td>
        <td>${a.Telephone}</td><td>${a.Email}</td>
        <td><span class="pill ${a.Master==='Y'?'pill-master':'pill-agency'}">${a.Master==='Y'?'Master':'Agency'}</span></td>
        <td><span class="badge-${a.Active==='Y'?'active':'inactive'}">${a.Active==='Y'?'Active':'Inactive'}</span></td>
        <td>
          <button class="btn-edit" onclick="openEditAgency('${a.AgencyCode}')"><i class="fa-solid fa-pen"></i></button>
          ${canDel?`<button class="btn-del" onclick="deleteAgency('${a.AgencyCode}','${a.AgencyName.replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button>`:''}
        </td>
      </tr>`;}).join('')}</tbody>
    </table></div></div>`;
  }

  function renderClients() {
    return `<div class="table-card">
    <div class="table-card-header"><h5>All Clients (${C().length})</h5></div>
    <div class="filter-bar"><i class="fa-solid fa-magnifying-glass" style="color:#aaa"></i><input id="filter-clients" placeholder="Search clients..." oninput="filterTable('filter-clients','tbl-clients')"></div>
    <div class="table-responsive"><table class="data-table" id="tbl-clients">
      <thead><tr><th>Code</th><th>Name</th><th>Agency</th><th>Phone</th><th>Email</th><th>Since</th><th>Employee</th><th>Can Delete</th><th>Active</th><th>Actions</th></tr></thead>
      <tbody>${C().map(c=>{
        const ag=DB.findOne('agencies',{AgencyCode:c.AgencyCode})||{};
        return`<tr>

  function toggleUnitGroup(propCode) {
    window._uCollapsed[propCode] = !window._uCollapsed[propCode];
    buildUnitGroups();

  function buildUnitGroups() {
    const search = window._uSearch || '';
    const status = window._uStatus || '';

    let units = U().slice().sort((a,b) => {
      const pa = DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb = DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const pCmp = (pa.PropertyName||'').localeCompare(pb.PropertyName||'');
      if (pCmp !== 0) return pCmp;
      return (a.UnitNumber||'').localeCompare(b.UnitNumber||'',undefined,{numeric:true});
    });

    if (status) units = units.filter(u => u.UnitStatus === status);
    if (search) {
      units = units.filter(u => {
        const p = DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
        return (p.PropertyName||'').toLowerCase().includes(search)
            || (u.UnitNumber||'').toLowerCase().includes(search)
            || (u.UnitCode||'').toLowerCase().includes(search);
      });
    }

    const titleEl = document.getElementById('units-hdr-title');
    if (titleEl) titleEl.textContent = 'All Units (' + units.length + ')';

    const groups = {};
    const order  = [];
    units.forEach(u => {
      const p = DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
      if (!groups[u.PropertyCode]) {
        groups[u.PropertyCode] = {propName: p.PropertyName||u.PropertyCode, units:[]};
        order.push(u.PropertyCode);
      }
      groups[u.PropertyCode].units.push(u);
    });

    const container = document.getElementById('unit-groups');
    if (!container) return;

    if (!order.length) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:.9rem">No units match the current filter.</div>';
      return;
    }

    container.innerHTML = order.map(propCode => {
      const grp       = groups[propCode];
      const collapsed = window._uCollapsed[propCode];
      const totalRent = grp.units.reduce((s,u) => s + Number(u.RentAmount||0), 0);
      const totalDep  = grp.units.reduce((s,u) => s + Number(u.DepositAmount||0), 0);
      const rows = grp.units.map(u => `<tr>
        <td style="font-family:monospace">${u.UnitCode}</td>
        <td><strong>${u.UnitNumber}</strong></td>
        <td>$${Number(u.RentAmount).toLocaleString()}</td>
        <td>$${Number(u.DepositAmount).toLocaleString()}</td>
        <td><span class="${u.UnitStatus==='Occupied'?'badge-occupied':'badge-vacant'}">${u.UnitStatus}</span></td>
        <td><span class="badge-${u.Active==='Y'?'active':'inactive'}">${u.Active==='Y'?'Yes':'No'}</span></td>
        <td>
          <button class="btn-edit" onclick="openEditUnit('${u.UnitCode}')"><i class="fa-solid fa-pen"></i></button>
          <button class="btn-del"  onclick="deleteUnit('${u.UnitCode}','${u.UnitNumber}')"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>`).join('');

      return `<div class="unit-group">
        <div class="unit-group-hdr" onclick="toggleUnitGroup('${propCode}')">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <i class="fa-solid fa-building" style="color:#9b0000"></i>
            <strong style="font-size:.93rem">${grp.propName}</strong>
            <span class="unit-count-pill">${grp.units.length} unit${grp.units.length!==1?'s':''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Rent</span>
              <strong>$${totalRent.toLocaleString()}</strong>
            </span>
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Deposit</span>
              <strong>$${totalDep.toLocaleString()}</strong>
            </span>
            <i class="fa-solid fa-chevron-${collapsed?'right':'down'}" style="color:#9b0000;font-size:.8rem"></i>
          </div>
        </div>
        <div class="unit-grp-body" style="display:${collapsed?'none':'block'}">
          <div class="table-responsive">
            <table class="data-table">
              <thead><tr><th>Code</th><th>Unit#</th><th>Rent</th><th>Deposit</th><th>Status</th><th>Active</th><th>Actions</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function deleteTenant(id, name) {
    const t = DB.findOne('tenants', {TenantID: id});
    if (t && t.Active === 'Y') {
      toast('Cannot delete "'+name+'" — deactivate the tenant first.','error'); return;
    }
    const hasTx = DB.getAll('transactions').some(tx => tx.TenantID === id);
    if (hasTx) {
      toast('Cannot delete "'+name+'" — tenant has linked transactions.','error'); return;
    }
    if (!confirm('Delete tenant "'+name+'"? This cannot be undone.')) return;
    if (t && t.UnitCode) DB.update('propunits','UnitCode',t.UnitCode,{UnitStatus:'Vacant'});
    DB.remove('tenants','TenantID',id);
    showView('tenants', document.querySelector('[data-view="tenants"]'));
    toast(name+' deleted.','info');
  }

  function buildTenantGroups() {
    const search = window._tSearch || '';
    const allTx  = DB.getAll('transactions');

    let tenants = T().slice().sort((a,b) => {
      const pa = DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb = DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const ua = DB.findOne('propunits',{UnitCode:a.UnitCode})||{};
      const ub = DB.findOne('propunits',{UnitCode:b.UnitCode})||{};
      const pCmp = (pa.PropertyName||'').localeCompare(pb.PropertyName||'');
      if (pCmp !== 0) return pCmp;
      return (ua.UnitNumber||'').localeCompare(ub.UnitNumber||'',undefined,{numeric:true});
    });

    if (search) {
      tenants = tenants.filter(t => {
        const u = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
        return (t.FirstName+' '+t.LastName).toLowerCase().includes(search)
            || (t.LastName+' '+t.FirstName).toLowerCase().includes(search)
            || (u.UnitNumber||'').toLowerCase().includes(search)
            || (t.TenantNumber||'').toLowerCase().includes(search);
      });

    const titleEl = document.getElementById('tenants-hdr-title');
    if (titleEl) titleEl.textContent = 'All Tenants (' + tenants.length + ')';

    const groups = {};
    const order  = [];
    tenants.forEach(t => {
      const p = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
      if (!groups[t.PropertyCode]) {
        groups[t.PropertyCode] = {propName: p.PropertyName||t.PropertyCode, tenants:[]};
        order.push(t.PropertyCode);
      }
      groups[t.PropertyCode].tenants.push(t);
    });

    const container = document.getElementById('tenant-groups');
    if (!container) return;

    if (!order.length) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:.9rem">No tenants match the current search.</div>';
      return;
    }

    container.innerHTML = order.map(propCode => {
      const grp       = groups[propCode];
      const collapsed = window._tCollapsed[propCode];
      const totalRent = grp.tenants.reduce((s,t) => s + Number(t.RentAmount||0), 0);
      const totalDep  = grp.tenants.reduce((s,t) => s + Number(t.DepositAmount||0), 0);

      const rows = grp.tenants.map(t => {
        const u      = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
        const canDel = t.Active !== 'Y' && !allTx.some(tx => tx.TenantID === t.TenantID);
        return `<tr>
          <td style="font-size:.78rem;font-family:monospace">${t.TenantNumber}</td>
          <td><strong>${t.FirstName} ${t.LastName}</strong><br><span class="text-muted-sm">${t.Email}</span></td>
          <td style="font-size:.78rem">${t.IDNumber}</td>
          <td><strong>${u.UnitNumber||'?'}</strong></td>
          <td>$${Number(t.RentAmount).toLocaleString()} / ${t.RentFrequency}</td>
          <td>$${Number(t.DepositAmount||0).toLocaleString()}</td>
          <td>${fmtDate(t.MoveInDate)}</td>
          <td><span class="badge-${t.Active==='Y'?'active':'inactive'}">${t.Active==='Y'?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn-edit" onclick="openEditTenant('${t.TenantID}')"><i class="fa-solid fa-pen"></i></button>
            ${canDel?`<button class="btn-del" onclick="deleteTenant('${t.TenantID}','${t.FirstName} ${t.LastName}')"><i class="fa-solid fa-trash"></i></button>`:''}
          </td>
        </tr>`;
      }).join('');

      return `<div class="unit-group">
        <div class="tenant-group-hdr" onclick="toggleTenantGroup('${propCode}')">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <i class="fa-solid fa-building" style="color:#9b0000"></i>
            <strong style="font-size:.93rem">${grp.propName}</strong>
            <span class="tenant-count-pill">${grp.tenants.length} tenant${grp.tenants.length!==1?'s':''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;">
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Rent</span>
              <strong>$${totalRent.toLocaleString()}</strong>
            </span>
            <span style="font-size:.78rem;text-align:right">
              <span style="color:#aaa;font-size:.7rem;display:block">Total Deposit</span>
              <strong>$${totalDep.toLocaleString()}</strong>
            </span>
            <i class="fa-solid fa-chevron-${collapsed?'right':'down'}" style="color:#9b0000;font-size:.8rem"></i>
          </div>
        </div>
        <div class="tenant-grp-body" style="display:${collapsed?'none':'block'}">
          <div class="table-responsive">
            <table class="data-table">
              <thead><tr><th>Tenant#</th><th>Name</th><th>ID</th><th>Unit#</th><th>Rent</th><th>Deposit</th><th>Move-in</th><th>Active</th><th>Actions</th></tr></thead>

  function viewTxDetail(ref) {
    const tx = DB.getAll('transactions').find(t => t.transactionRef === ref);
    if (!tx) return;
    const hasDoc = tx.TransactionDocument && tx.TransactionDocument.length > 0;
    const preview = hasDoc
      ? (tx.TransactionDocument.startsWith('data:image')
          ? `<img src="${tx.TransactionDocument}" style="max-width:100%;border-radius:6px;margin-top:10px">`
          : `<iframe src="${tx.TransactionDocument}" style="width:100%;height:380px;border:none;border-radius:6px;margin-top:10px"></iframe>`)
      : '<p style="color:#aaa;margin-top:8px">No document attached.</p>';
    openModal('Transaction — '+ref,
      `<p style="margin:0 0 6px"><strong>Note:</strong> ${tx.TransactionNote||'—'}</p>
       <p style="margin:0 0 4px"><strong>Currency:</strong> ${tx.Currency||'—'}</p>
       ${hasDoc?`<p style="margin:0 0 4px"><a href="${tx.TransactionDocument}" download="doc-${ref}" target="_blank"><i class="fa-solid fa-file-arrow-down"></i> Download Document</a></p>`:''}
       ${preview}`,
      `<button class="btn-back" onclick="closeModal()">Close</button>`,true
    );
  }

  function renderTransactions() {
    const clientOpts = C().map(c=>`<option value="${c.ClientCode}">${c.ClientName}</option>`).join('');
    const propOpts   = P().map(p=>`<option value="${p.PropertyCode}">${p.PropertyName}</option>`).join('');
    const from = window._mTxFrom||'', to = window._mTxTo||'';
    return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 16px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <select id="tx-client-filter" class="form-control-sm2" style="min-width:150px;font-size:.82rem;padding:4px 8px;" onchange="filterTxView()">
        <option value="">All Clients</option>${clientOpts}
      </select>
      <select id="tx-prop-filter" class="form-control-sm2" style="min-width:150px;font-size:.82rem;padding:4px 8px;" onchange="filterTxView()">
        <option value="">All Properties</option>${propOpts}

      <label style="font-size:.85rem;font-weight:600;color:#444;margin:0">Date:</label>

      <span style="color:#888;font-size:.9rem">to</span>

      <button class="btn-back" onclick="clearMasterTxFilter()" style="padding:5px 14px">Clear</button>

  function applyMasterTxFilter() {
    window._mTxFrom = document.getElementById('tx-from').value;
    window._mTxTo   = document.getElementById('tx-to').value;
    filterTxView();
  }

  function clearMasterTxFilter() {
    window._mTxFrom = ''; window._mTxTo = '';
    document.getElementById('tx-from').value = '';
    document.getElementById('tx-to').value   = '';
    filterTxView();
  }

  function filterTxView() {
    const clientCode = document.getElementById('tx-client-filter') ? document.getElementById('tx-client-filter').value : '';
    const propSel    = document.getElementById('tx-prop-filter');
    const prevProp   = propSel ? propSel.value : '';
    const allProps   = P();
    const filteredProps = clientCode ? allProps.filter(p=>p.ClientCode===clientCode) : allProps;
    if (propSel) {
      propSel.innerHTML = '<option value="">All Properties</option>' +
        filteredProps.map(p=>`<option value="${p.PropertyCode}" ${p.PropertyCode===prevProp?'selected':''}>${p.PropertyName}</option>`).join('');
    }
    const propCode  = propSel ? propSel.value : '';
    const fromDate  = window._mTxFrom || '';
    const toDate    = window._mTxTo   || '';

    let txs = DB.getAll('transactions').slice().sort((a,b)=>new Date(b.Date)-new Date(a.Date));
    if (clientCode) { const cc=allProps.filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode); txs=txs.filter(tx=>cc.includes(tx.PropertyCode)); }
    if (propCode)   txs = txs.filter(tx=>tx.PropertyCode===propCode);
    if (fromDate)   txs = txs.filter(tx=>tx.Date>=fromDate);
    if (toDate)     txs = txs.filter(tx=>tx.Date<=toDate);

    const bal = txs.reduce((s,t)=>s+Number(t.Amount),0);
    const lbl = document.getElementById('tx-total-lbl');
    if (lbl) lbl.innerHTML = `Total:&nbsp;<strong style="color:${bal>=0?'#2d9b59':'#d62828'}">${fmtMoney(bal)}</strong>&nbsp;<span style="color:#888;font-size:.82rem">(${txs.length} records)</span>`;

    // Group by property
    const byProp = {};
    txs.forEach(tx=>{ if(!byProp[tx.PropertyCode]) byProp[tx.PropertyCode]=[]; byProp[tx.PropertyCode].push(tx); });

    function renderTxRow(tx) {
      const ten = DB.findOne('tenants',{TenantID:tx.TenantID})||{};
      const isV = tx.Authenticated==='Y';
      const amt = Number(tx.Amount), credit = amt>=0;
      const amtColor = credit?'#2d9b59':'#d62828';
      const amtFmt   = (credit?'+':'')+fmtMoney(tx.Amount);
      const amtHtml  = tx.TransactionDocument
        ? `<a href="#" onclick="viewTxDetail('${tx.transactionRef}');return false;" style="font-weight:600;color:${amtColor};text-decoration:underline dotted;cursor:pointer" title="View attached document">${amtFmt}</a>`
        : `<span style="font-weight:600;color:${amtColor}">${amtFmt}</span>`;
      return `<tr>
        <td>${fmtDate(tx.Date)}</td>
        <td>${ten.FirstName||''} ${ten.LastName||''}</td>
        <td>${tx.Description}</td>
        <td>${amtHtml}</td>
        <td style="font-size:.72rem;font-family:monospace">${tx.transactionRef}</td>
        <td><span class="badge-${isV?'active':'inactive'}">${isV?'Verified':'Pending'}</span></td>
        <td>
          <button class="btn-${isV?'view':'edit'}" onclick="toggleAuth('${tx.transactionRef}')">${isV?'Unverify':'Verify'}</button>
          <button class="btn-del" onclick="confirmDeleteTx('${tx.transactionRef}')"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>`;
    }

    function renderStatusGroup(label, groupTxs) {
      if (!groupTxs.length) return '';
      return `<div style="margin-bottom:10px">
        <div style="font-weight:600;font-size:.82rem;color:#555;padding:3px 10px;background:#f0f0f0;border-radius:4px;margin-bottom:5px">${label} (${groupTxs.length})</div>
        <div class="table-responsive"><table class="data-table">
          <thead><tr><th>Date</th><th>Tenant</th><th>Description</th><th>Amount</th><th>Ref</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${groupTxs.map(renderTxRow).join('')}</tbody>
        </table></div>
      </div>`;
    }

    const codes = Object.keys(byProp).sort();
    let sectionsHtml = codes.map(code => {
      const prop = DB.findOne('properties',{PropertyCode:code})||{};
      const propName = prop.PropertyName || code;
      const propTxs  = byProp[code];
      const propBal  = propTxs.reduce((s,t)=>s+Number(t.Amount),0);
      const pending  = propTxs.filter(t=>t.Authenticated!=='Y');
      const verified = propTxs.filter(t=>t.Authenticated==='Y');
      const sid = 'mtx-'+code.replace(/[^a-z0-9]/gi,'_');
      return `<div class="table-card" style="margin-bottom:14px">
        <div class="table-card-header" style="cursor:pointer;user-select:none" onclick="toggleMTxSection('${sid}')">
          <h5><i class="fa-solid fa-building" style="margin-right:7px;color:#9b0000"></i>${propName}</h5>
          <span>Balance:&nbsp;<strong style="color:${propBal>=0?'#2d9b59':'#d62828'}">${fmtMoney(propBal)}</strong>
            &nbsp;<i class="fa-solid fa-chevron-down" id="${sid}-icon" style="font-size:.8rem;color:#aaa;transition:transform .25s"></i></span>
        </div>
        <div id="${sid}">
          ${renderStatusGroup('Pending', pending)}
          ${renderStatusGroup('Verified', verified)}
          ${!pending.length&&!verified.length?'<p style="text-align:center;padding:20px;color:#aaa">No transactions.</p>':''}
        </div>
      </div>`;
    }).join('');

    if (!codes.length) sectionsHtml = `<div class="table-card"><p style="text-align:center;padding:40px;color:#aaa">No transactions found.</p></div>`;

    const wrap = document.getElementById('tx-sections-wrap');
    if (wrap) wrap.innerHTML = sectionsHtml;
  }

  function toggleMTxSection(sid) {
    const el   = document.getElementById(sid);
    const icon = document.getElementById(sid+'-icon');
    if (!el) return;
    const collapsed = el.style.display==='none';
    el.style.display = collapsed ? '' : 'none';
    if (icon) icon.style.transform = collapsed ? '' : 'rotate(-90deg)';
  }

  function toggleAuth(ref) {
    const all=DB.getAll('transactions');
    const idx=all.findIndex(t=>t.transactionRef===ref);
    if(idx===-1)return;
    all[idx].Authenticated=all[idx].Authenticated==='Y'?'N':'Y';
    DB.save('transactions',all);
    filterTxView();
    toast('Transaction '+(all[idx].Authenticated==='Y'?'verified':'marked as pending')+'.','success');
  }

  // Delete transaction — only if NOT authenticated
  function confirmDeleteTx(ref) {
    const tx = DB.getAll('transactions').find(t => t.transactionRef === ref);
    if (tx && tx.Authenticated === 'Y') {
      toast('Cannot delete an authenticated transaction. Unverify it first.', 'error');
      return;
    }
    if (!confirm('Delete transaction ' + ref + '? This cannot be undone.')) return;
    const all = DB.getAll('transactions').filter(t => t.transactionRef !== ref);
    DB.save('transactions', all);
    filterTxView();
    toast('Transaction deleted.', 'info');
  }

  // Delete property — only if inactive and no transactions
  function deleteProperty(code, name) {
    const prop = DB.findOne('properties', {PropertyCode: code});
    if (prop && prop.Active === 'Y') {
      toast('Cannot delete "' + name + '" — deactivate it first.', 'error'); return;
    }
    const hasTx = DB.getAll('transactions').some(tx => tx.PropertyCode === code);
    if (hasTx) {
      toast('Cannot delete "' + name + '" — it has linked transactions.', 'error'); return;
    }
    if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
    DB.remove('properties', 'PropertyCode', code);
    showView('properties', document.querySelector('[data-view="properties"]'));
    toast(name + ' deleted.', 'info');
  }

  // Delete unit — blocked if occupied
  function deleteUnit(code, unitNum) {
    const unit = DB.findOne('propunits', {UnitCode: code});
    if (unit && unit.UnitStatus === 'Occupied') {
      toast('Cannot delete Unit ' + unitNum + ' — it is currently occupied.', 'error');
      return;
    }
    if (!confirm('Delete "Unit ' + unitNum + '"? This cannot be undone.')) return;
    DB.remove('propunits', 'UnitCode', code);
    showView('units', document.querySelector('[data-view="units"]'));
    toast('Unit ' + unitNum + ' deleted.', 'info');
  }

  function confirmDelete(table, key, value, label) {
    if(!confirm(`Delete "${label}"? This cannot be undone.`))return;
    DB.remove(table,key,value);
    const activeBtn = document.querySelector('.nav-link-btn.active');
    if(activeBtn) showView(activeBtn.dataset.view, activeBtn);
    toast(label+' deleted.','info');

  function renderUnitsPreview(rows) {
    const allPropCodes = P().map(p => p.PropertyCode);
    const seen = {};
    let validCount = 0;
    const rowData = rows.map((row) => {
      const errors = [];
      const propCode = String(row.PropertyCode||'').trim();
      const unitNum  = String(row.UnitNumber||'').trim();
      if (!propCode) errors.push('PropertyCode required');
      else if (!allPropCodes.includes(propCode)) errors.push('PropertyCode not found');
      if (!unitNum) errors.push('UnitNumber required');
      else if (propCode && allPropCodes.includes(propCode)) {
        if (DB.find('propunits',{PropertyCode:propCode}).some(u=>String(u.UnitNumber)===unitNum)) errors.push('Unit already exists');
        const bk = propCode+'|'+unitNum;
        if (seen[bk]) errors.push('Duplicate in file'); else seen[bk]=true;
      }
      if (row.RentAmount===''    || isNaN(Number(row.RentAmount)))    errors.push('Invalid RentAmount');
      if (row.DepositAmount==='' || isNaN(Number(row.DepositAmount))) errors.push('Invalid DepositAmount');
      if (row.Bedrooms===''      || isNaN(Number(row.Bedrooms)))      errors.push('Invalid Bedrooms');
      if (row.Bathrooms===''     || isNaN(Number(row.Bathrooms)))     errors.push('Invalid Bathrooms');
      if (row.Floor===''         || isNaN(Number(row.Floor)))         errors.push('Invalid Floor');
      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, propCode, unitNum, valid, errors};
    });
    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length-validCount} errors</strong></div>`;
    html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:.76rem"><thead><tr><th>#</th><th>PropertyCode</th><th>UnitNumber</th><th>Rent</th><th>Deposit</th><th>Bed</th><th>Bath</th><th>Floor</th><th>Status</th><th>Validation</th></tr></thead><tbody>`;
    rowData.forEach(({row,propCode,unitNum,valid,errors},i) => {
      html += `<tr style="background:${valid?'':'#fff5f5'}"><td>${i+1}</td><td style="font-family:monospace">${propCode}</td><td>${unitNum}</td><td>${row.RentAmount}</td><td>${row.DepositAmount}</td><td>${row.Bedrooms}</td><td>${row.Bathrooms}</td><td>${row.Floor}</td><td>${String(row.UnitStatus||'Vacant')}</td><td style="color:${valid?'#2d9b59':'#d62828'};font-size:.78rem">${valid?'<i class="fa-solid fa-check"></i> OK':errors.join('; ')}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    if (rows.length-validCount>0) html += `<div style="font-size:.78rem;color:#888;margin-top:6px"><i class="fa-solid fa-circle-info"></i> Only valid rows will be imported.</div>`;
    document.getElementById('uu-preview').innerHTML = html;
    const btn = document.getElementById('uu-save-btn');
    if (btn) { btn.style.display = validCount>0?'':'none'; btn.innerHTML=`<i class="fa-solid fa-upload"></i> Import ${validCount} Unit(s)`; }
    window._unitUploadRowData = rowData;
  }

  function saveUnitsUpload() {

    const FREQ = ['Monthly','Quarterly','SemiAnnually','Annually'];
    let validCount = 0;
    const rowData = rows.map((row) => {
      const errors = [];
      const propCode = String(row.PropertyCode||'').trim();
      const unitNum  = String(row.UnitNumber||'').trim();
      if (!String(row.FirstName||'').trim()) errors.push('FirstName required');
      if (!String(row.LastName||'').trim())  errors.push('LastName required');
      if (!String(row.IDNumber||'').trim())  errors.push('IDNumber required');
      if (!String(row.Telephone||'').trim()) errors.push('Telephone required');
      if (!String(row.Email||'').trim())     errors.push('Email required');
      if (!propCode) errors.push('PropertyCode required');
      else if (!allPropCodes.includes(propCode)) errors.push('PropertyCode not found');
      let resolvedUnitCode = '', resolvedRent = 0, resolvedDep = 0;
      if (!unitNum) errors.push('UnitNumber required');
      else if (propCode && allPropCodes.includes(propCode)) {
        const unit = DB.find('propunits',{PropertyCode:propCode}).find(u=>String(u.UnitNumber)===unitNum);
        if (!unit) errors.push(`Unit ${unitNum} not found in ${propCode}`);
        else if (unit.UnitStatus==='Occupied') errors.push(`Unit ${unitNum} is already Occupied`);
        else { resolvedUnitCode=unit.UnitCode; resolvedRent=Number(unit.RentAmount); resolvedDep=Number(unit.DepositAmount); }
      }
      const freq = String(row.RentFrequency||'').trim();
      if (!freq) errors.push('RentFrequency required');
      else if (!FREQ.includes(freq)) errors.push(`RentFrequency: ${FREQ.join(' | ')}`);
      const nd = mNormDate(row.MoveInDate);
      if (!nd) errors.push('MoveInDate required');
      else if (isNaN(Date.parse(nd))) errors.push('Invalid MoveInDate');
      const effectiveRent = (row.RentAmount!=='' && !isNaN(Number(row.RentAmount))) ? parseFloat(row.RentAmount) : resolvedRent;
      const effectiveDep  = (row.DepositAmount!=='' && !isNaN(Number(row.DepositAmount))) ? parseFloat(row.DepositAmount) : resolvedDep;
      const valid = errors.length === 0;
      if (valid) validCount++;
      return {row, propCode, unitNum, resolvedUnitCode, effectiveRent, effectiveDep, normDate:nd, valid, errors};
    });
    let html = `<div style="font-size:.82rem;margin-bottom:6px"><strong>${rows.length}</strong> row(s) &nbsp;|&nbsp; <strong style="color:#2d9b59">${validCount} valid</strong> &nbsp;|&nbsp; <strong style="color:#d62828">${rows.length-validCount} errors</strong></div>`;
    html += `<div style="overflow-x:auto"><table class="data-table" style="font-size:.76rem"><thead><tr><th>#</th><th>Name</th><th>ID Number</th><th>Email</th><th>PropertyCode</th><th>Unit</th><th>Rent</th><th>Freq</th><th>Move-in</th><th>Validation</th></tr></thead><tbody>`;
    rowData.forEach(({row,propCode,unitNum,normDate:nd,effectiveRent,valid,errors},i) => {
      html += `<tr style="background:${valid?'':'#fff5f5'}"><td>${i+1}</td><td><strong>${String(row.FirstName||'')} ${String(row.LastName||'')}</strong></td><td style="font-family:monospace;font-size:.74rem">${row.IDNumber||''}</td><td style="font-size:.74rem">${row.Email||''}</td><td style="font-family:monospace">${propCode}</td><td>${unitNum}</td><td>${fmtMoney(effectiveRent)}</td><td>${row.RentFrequency||''}</td><td>${nd||row.MoveInDate||''}</td><td style="color:${valid?'#2d9b59':'#d62828'};font-size:.78rem;min-width:140px">${valid?'<i class="fa-solid fa-check"></i> OK':errors.join('; ')}</td></tr>`;
    });
    html += `</tbody></table></div>`;
    if (rows.length-validCount>0) html += `<div style="font-size:.78rem;color:#888;margin-top:6px"><i class="fa-solid fa-circle-info"></i> Only valid rows imported. Units will be marked Occupied. Photos/documents can be attached via Edit Tenant.</div>`;
    document.getElementById('tu-preview').innerHTML = html;
    const btn = document.getElementById('tu-save-btn');
    if (btn) { btn.style.display = validCount>0?'':'none'; btn.innerHTML=`<i class="fa-solid fa-upload"></i> Import ${validCount} Tenant(s)`; }
    window._tenantUploadRowData = rowData;
  }

  function saveProfile(e) {
    e.preventDefault();
    const a = DB.findOne('agencies', { AgencyCode: masterAgency.AgencyCode });
    if (!a) { toast('Agency record not found.', 'error'); return; }

    const name    = document.getElementById('prof-name').value.trim();
    const email   = document.getElementById('prof-email').value.trim();
    const tel     = document.getElementById('prof-tel').value.trim();
    const address = document.getElementById('prof-address').value.trim();
    const newPwd  = document.getElementById('prof-new-pwd').value;
    const confPwd = document.getElementById('prof-conf-pwd').value;

    if (!name || !email) { toast('Name and email are required.', 'error'); return; }

    const updates = { AgencyName: name, Email: email, Telephone: tel, Address: address };

    if (newPwd || confPwd) {
      if (newPwd.length < 6) { toast('New password must be at least 6 characters.', 'error'); return; }
      if (newPwd !== confPwd) { toast('New passwords do not match.', 'error'); return; }
      updates.Password = newPwd;
      updates.password = newPwd;
    }

    DB.update('agencies', 'AgencyCode', masterAgency.AgencyCode, updates);
    masterAgency = DB.findOne('agencies', { AgencyCode: masterAgency.AgencyCode });
    document.getElementById('sb-name').textContent = masterAgency.AgencyName;
    document.getElementById('sb-avatar').textContent = masterAgency.AgencyName[0].toUpperCase();

    document.getElementById('prof-new-pwd').value = '';
    document.getElementById('prof-conf-pwd').value = '';

    toast('Profile updated successfully.', 'success');
  }

  function showRptTab(name, btn) {
    ['clientTx','propTx','tenantStmt','tenantList','unitList'].forEach(t=>{
      const el=document.getElementById('rpt-'+t);
      if(el){el.style.display='none';el.style.opacity='0';}
    });
    document.querySelectorAll('.rpt-tab').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    const active=document.getElementById('rpt-'+name);
    if(active){active.style.display='';active.style.opacity='1';}
  }

  function _txTableRows(txs) {
    let runBal=0;
    return txs.slice().sort((a,b)=>new Date(a.Date)-new Date(b.Date)).map(tx=>{
      runBal+=Number(tx.Amount);
      const credit=Number(tx.Amount)>=0;
      const ten=DB.findOne('tenants',{TenantID:tx.TenantID})||{};
      return `<tr>
        <td>${fmtDate(tx.Date)}</td>
        <td>${ten.FirstName||''} ${ten.LastName||''}</td>
        <td>${tx.Description}</td>
        <td>${tx.transactionRef}</td>
        <td style="color:${credit?'#1a6b3c':'#d62828'}">${credit?fmtMoney(tx.Amount):''}</td>
        <td style="color:${!credit?'#d62828':''}">${!credit?fmtMoney(Math.abs(tx.Amount)):''}</td>
        <td style="font-weight:600;color:${runBal>=0?'#1a6b3c':'#d62828'}">${fmtMoney(runBal)}</td>
        <td><span class="badge-${tx.Authenticated==='Y'?'active':'inactive'}">${tx.Authenticated==='Y'?'Verified':'Pending'}</span></td>
      </tr>`;
    }).join('');
  }

  function _txTable(txs, closingBal) {
    return `<table class="data-table" style="width:100%;font-size:.82rem">
      <thead><tr><th>Date</th><th>Tenant</th><th>Description</th><th>Ref</th><th>Credit</th><th>Debit</th><th>Balance</th><th>Status</th></tr></thead>
      <tbody>${_txTableRows(txs)}</tbody>
      <tfoot><tr style="background:#f5f5f5;font-weight:700"><td colspan="6" style="text-align:right;padding:8px 12px">Closing Balance</td>
        <td style="color:${closingBal>=0?'#1a6b3c':'#d62828'};padding:8px 12px">${fmtMoney(closingBal)}</td><td></td></tr></tfoot>
    </table>`;
  }

  function genClientTxReport() {
    const clientCode = document.getElementById('r-cl-client').value;
    const from = document.getElementById('r-cl-from').value;
    const to   = document.getElementById('r-cl-to').value;
    let txs = TX().slice();
    if (clientCode) {
      const pCodes = P().filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode);
      txs = txs.filter(t=>pCodes.includes(t.PropertyCode));
    }
    if (from) txs = txs.filter(t=>t.Date>=from);
    if (to)   txs = txs.filter(t=>t.Date<=to);
    const bal = txs.reduce((s,t)=>s+Number(t.Amount),0);
    const cl  = clientCode ? (DB.findOne('clients',{ClientCode:clientCode})||{ClientName:clientCode}) : {ClientName:'All Clients'};
    const out = document.getElementById('r-cl-out');
    out.innerHTML = `<div style="margin-bottom:10px;font-weight:600">${cl.ClientName} &mdash; ${from||'Start'} to ${to||'Today'} &mdash; ${txs.length} transactions</div>
      ${_txTable(txs,bal)}
      <div class="rpt-print-btn"><button class="btn-primary-custom bg-master" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button> <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('r-cl-out','client-transactions')"><i class="fa-solid fa-file-excel"></i> Export Excel</button> <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('r-cl-out','client-transactions')"><i class="fa-solid fa-file-csv"></i> Export CSV</button></div>`;
  }

  function genTenantStmtReport() {
    const sel = document.getElementById('r-ts-tenants');
    const ids = Array.from(sel.selectedOptions).map(o=>o.value);
    if (!ids.length) { toast('Select at least one tenant.','error'); return; }
    const allTxs = TX();
    let html = '';
    ids.forEach((id,i)=>{
      const ten = DB.findOne('tenants',{TenantID:id})||{};
      const txs = allTxs.filter(t=>t.TenantID===id);
      const bal = txs.reduce((s,t)=>s+Number(t.Amount),0);
      const prop = DB.findOne('properties',{PropertyCode:ten.PropertyCode})||{};
      html += `<div ${i>0?'style="page-break-before:always"':''}>
        <div style="margin-bottom:10px;font-weight:600">${ten.FirstName||''} ${ten.LastName||''} &mdash; ${prop.PropertyName||''}</div>
        ${_txTable(txs,bal)}
      </div>`;
    });
    document.getElementById('r-ts-out').innerHTML = html +
      `<div class="rpt-print-btn"><button class="btn-primary-custom bg-master" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button> <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('r-ts-out','tenant-statements')"><i class="fa-solid fa-file-excel"></i> Export Excel</button> <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('r-ts-out','tenant-statements')"><i class="fa-solid fa-file-csv"></i> Export CSV</button></div>`;

  function genTenantListReport() {
    const clientCode = document.getElementById('r-tl-client').value;
    const propCode   = document.getElementById('r-tl-prop').value;
    const status     = document.getElementById('r-tl-status').value;
    let tenants = T();
    if (propCode) tenants = tenants.filter(t=>t.PropertyCode===propCode);
    else if (clientCode) {
      const pCodes = P().filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode);
      tenants = tenants.filter(t=>pCodes.includes(t.PropertyCode));
    }
    if (status) tenants = tenants.filter(t=>t.Active===status);
    tenants = tenants.slice().sort((a,b)=>{
      const pa=DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb=DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      const ua=DB.findOne('propunits',{UnitCode:a.UnitCode})||{};
      const ub=DB.findOne('propunits',{UnitCode:b.UnitCode})||{};
      return (pa.PropertyName||'').localeCompare(pb.PropertyName||'') || (ua.UnitNumber||'').localeCompare(ub.UnitNumber||'', undefined, { numeric: true, sensitivity: 'base' });
    });
    const prop = propCode ? (DB.findOne('properties',{PropertyCode:propCode})||{PropertyName:propCode}) : {PropertyName:'All Properties'};

    // Group by property
    const groups = {}, groupOrder = [];
    tenants.forEach(t => {
      if (!groups[t.PropertyCode]) {
        const p = DB.findOne('properties',{PropertyCode:t.PropertyCode})||{};
        groups[t.PropertyCode] = { propName: p.PropertyName||t.PropertyCode, tenants: [] };
        groupOrder.push(t.PropertyCode);
      }
      groups[t.PropertyCode].tenants.push(t);
    });

    const groupsHtml = groupOrder.map(pc => {
      const g = groups[pc];
      const rows = g.tenants.map(t => {
        const u = DB.findOne('propunits',{UnitCode:t.UnitCode})||{};
        return `<tr>
          <td style="font-family:monospace">${t.TenantNumber}</td>
          <td>${t.FirstName} ${t.LastName}</td>
          <td>${u.UnitNumber||'?'}</td>
          <td>${Number(t.RentAmount).toLocaleString()} / ${t.RentFrequency}</td>
          <td>${fmtDate(t.MoveInDate)}</td>
          <td>${t.MoveOutDate?fmtDate(t.MoveOutDate):'—'}</td>
          <td><span class="badge-${t.Active==='Y'?'active':'inactive'}">${t.Active==='Y'?'Active':'Inactive'}</span></td>
        </tr>`;
      }).join('');
      return `<div class="tlist-grp" style="margin-bottom:10px">
        <div onclick="this.parentElement.classList.toggle('tlist-collapsed')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#eef2f7;border-radius:6px;font-weight:600;font-size:.88rem;user-select:none">
          <span class="tlist-arrow" style="display:inline-block;transition:transform .2s;font-size:.7rem">&#9660;</span>
          ${g.propName}
          <span style="font-weight:400;font-size:.78rem;color:#666;margin-left:auto">${g.tenants.length} tenant(s)</span>
        </div>
        <div class="tlist-body" style="overflow-x:auto">
          <table class="data-table" style="width:100%;font-size:.82rem">
            <thead><tr><th>Tenant#</th><th>Name</th><th>Unit#</th><th>Rent</th><th>Move-in</th><th>Move-out</th><th>Status</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');

    document.getElementById('r-tl-out').innerHTML = `
      <style>
        .tlist-grp.tlist-collapsed .tlist-body{display:none}
        .tlist-grp.tlist-collapsed .tlist-arrow{transform:rotate(-90deg)}
      </style>
      <div style="margin-bottom:10px;font-weight:600">${prop.PropertyName} &mdash; ${tenants.length} tenant(s)</div>
      ${groupsHtml || '<div style="text-align:center;padding:30px;color:#aaa">No tenants found.</div>'}
      <div class="rpt-print-btn"><button class="btn-primary-custom bg-master" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button> <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('r-tl-out','tenant-list')"><i class="fa-solid fa-file-excel"></i> Export Excel</button> <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('r-tl-out','tenant-list')"><i class="fa-solid fa-file-csv"></i> Export CSV</button></div>`;
  }

  function rptCascadePropsForUnitList() {
    const cc = document.getElementById('r-ul-client').value;
    const sel = document.getElementById('r-ul-prop');
    const filtered = cc ? P().filter(p=>p.ClientCode===cc) : P();
    sel.innerHTML = '<option value="">All Properties</option>' + filtered.map(p=>`<option value="${p.PropertyCode}">${p.PropertyName}</option>`).join('');
  }

  function genUnitListReport() {
    const clientCode = document.getElementById('r-ul-client').value;
    const propCode   = document.getElementById('r-ul-prop').value;
    const status     = document.getElementById('r-ul-status').value;
    let units = U();
    if (propCode) units = units.filter(u=>u.PropertyCode===propCode);
    else if (clientCode) {
      const pCodes = P().filter(p=>p.ClientCode===clientCode).map(p=>p.PropertyCode);
      units = units.filter(u=>pCodes.includes(u.PropertyCode));
    }
    if (status) units = units.filter(u=>u.UnitStatus===status);
    units = units.slice().sort((a,b)=>{
      const pa=DB.findOne('properties',{PropertyCode:a.PropertyCode})||{};
      const pb=DB.findOne('properties',{PropertyCode:b.PropertyCode})||{};
      return (pa.PropertyName||'').localeCompare(pb.PropertyName||'') || (a.UnitNumber||'').localeCompare(b.UnitNumber||'', undefined, { numeric: true, sensitivity: 'base' });
    });
    const cl   = clientCode ? (DB.findOne('clients',{ClientCode:clientCode})||{ClientName:clientCode}) : {ClientName:'All Clients'};
    const prop = propCode   ? (DB.findOne('properties',{PropertyCode:propCode})||{PropertyName:propCode}) : {PropertyName:'All Properties'};
    const statusLabel = status || 'All';

    // Group by property
    const groups = {}, groupOrder = [];
    units.forEach(u => {
      if (!groups[u.PropertyCode]) {
        const p = DB.findOne('properties',{PropertyCode:u.PropertyCode})||{};
        const c = DB.findOne('clients',{ClientCode:p.ClientCode})||{};
        groups[u.PropertyCode] = { propName: p.PropertyName||u.PropertyCode, currency: p.Currency||'$', clientName: c.ClientName||'', units: [] };
        groupOrder.push(u.PropertyCode);
      }
      groups[u.PropertyCode].units.push(u);
    });

    const groupsHtml = groupOrder.map(pc => {
      const g = groups[pc];
      const rows = g.units.map(u => `<tr>
          <td style="font-family:monospace">${u.UnitCode}</td>
          <td><strong>${u.UnitNumber}</strong></td>
          <td>${g.clientName}</td>
          <td>${g.currency}${Number(u.RentAmount).toLocaleString()}</td>
          <td>${g.currency}${Number(u.DepositAmount).toLocaleString()}</td>
          <td><span class="${u.UnitStatus==='Occupied'?'badge-occupied':'badge-vacant'}">${u.UnitStatus}</span></td>
          <td><span class="badge-${u.Active==='Y'?'active':'inactive'}">${u.Active==='Y'?'Yes':'No'}</span></td>
        </tr>`).join('');
      return `<div class="ulist-grp" style="margin-bottom:10px">
        <div onclick="this.parentElement.classList.toggle('ulist-collapsed')" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#eef2f7;border-radius:6px;font-weight:600;font-size:.88rem;user-select:none">
          <span class="ulist-arrow" style="display:inline-block;transition:transform .2s;font-size:.7rem">&#9660;</span>
          ${g.propName}
          <span style="font-weight:400;font-size:.78rem;color:#666;margin-left:auto">${g.units.length} unit(s)</span>
        </div>
        <div class="ulist-body" style="overflow-x:auto">
          <table class="data-table" style="width:100%;font-size:.82rem">
            <thead><tr><th>Unit Code</th><th>Unit #</th><th>Client</th><th>Rent</th><th>Deposit</th><th>Status</th><th>Active</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');

    document.getElementById('r-ul-out').innerHTML = `
      <style>
        .ulist-grp.ulist-collapsed .ulist-body{display:none}
        .ulist-grp.ulist-collapsed .ulist-arrow{transform:rotate(-90deg)}
      </style>
      <div style="margin-bottom:10px;font-weight:600">${cl.ClientName} &mdash; ${prop.PropertyName} &mdash; Status: ${statusLabel} &mdash; ${units.length} unit(s)</div>
      ${groupsHtml || '<div style="text-align:center;padding:30px;color:#aaa">No units found.</div>'}
      <div class="rpt-print-btn"><button class="btn-primary-custom bg-master" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button> <button class="btn-primary-custom" style="background:#1a6b3c" onclick="exportRptXLSX('r-ul-out','unit-list')"><i class="fa-solid fa-file-excel"></i> Export Excel</button> <button class="btn-primary-custom" style="background:#555" onclick="exportRptCSV('r-ul-out','unit-list')"><i class="fa-solid fa-file-csv"></i> Export CSV</button></div>`;
  }

  function backupAllData() {
    const backup = {
      version: 'pma_v1',
      timestamp: new Date().toISOString(),
      agencies:     DB.getAll('agencies'),
      clients:      DB.getAll('clients'),
      properties:   DB.getAll('properties'),
      propunits:    DB.getAll('propunits'),
      tenants:      DB.getAll('tenants'),
      transactions: DB.getAll('transactions')
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pma-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    toast('Backup downloaded successfully.','success');
  }

  function backupAllDataXLSX() {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded.','error'); return; }
    const wb = XLSX.utils.book_new();
    [['agencies','Agencies'],['clients','Clients'],['properties','Properties'],
     ['propunits','Units'],['tenants','Tenants'],['transactions','Transactions']].forEach(([t,name])=>{
      const data = DB.getAll(t);
      if (data.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), name);
    });
    XLSX.writeFile(wb, 'pma-backup-' + new Date().toISOString().slice(0,10) + '.xlsx');
    toast('Excel backup downloaded.','success');
  }

  function restoreFromBackup(input) {
    const file = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById('restore-status');
    statusEl.textContent = 'Reading file…';
    const reader = new FileReader();
    reader.onload = function(e) {
      let backup;
      try { backup = JSON.parse(e.target.result); }
      catch { toast('Invalid backup file — could not parse JSON.','error'); statusEl.textContent=''; return; }

      const keyFields = {
        agencies:'AgencyCode', clients:'ClientCode', properties:'PropertyCode',
        propunits:'UnitCode',  tenants:'TenantID',   transactions:'transactionRef'
      };
      let inserted = 0;
      ['agencies','clients','properties','propunits','tenants','transactions'].forEach(t => {
        const records = backup[t] || [];
        const existingKeys = new Set(DB.getAll(t).map(r => r[keyFields[t]]));
        records.forEach(rec => {
          if (!existingKeys.has(rec[keyFields[t]])) {
            DB.insert(t, rec);
            inserted++;
          }
        });
      });

      input.value = '';
      statusEl.textContent = inserted + ' record(s) restored successfully.';
      toast(inserted + ' record(s) restored.','success');
      if (inserted > 0) setTimeout(()=>{ DB.init(); showView('dashboard',document.querySelector('[data-view="dashboard"]')); },1800);
    };
    reader.readAsText(file);
  }

  function exportRptCSV(outId, filename) {
    const tbl = document.getElementById(outId).querySelector('table');
    if (!tbl) { toast('Generate a report first.','error'); return; }
    const rows = Array.from(tbl.querySelectorAll('tr'));
    const csv = rows.map(r => Array.from(r.querySelectorAll('th,td')).map(c => {
      const t = c.innerText.replace(/"/g,'""');
      return `"${t}"`;
    }).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = filename+'.csv'; a.click();
  }

  function exportRptXLSX(outId, filename) {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded.','error'); return; }
    const tbl = document.getElementById(outId).querySelector('table');
    if (!tbl) { toast('Generate a report first.','error'); return; }
    const wb = XLSX.utils.table_to_book(tbl, {sheet:'Report'});
    XLSX.writeFile(wb, filename+'.xlsx');
  }

  function toast(msg,type='info') {
    const c=document.getElementById('toast-container');
    const d=document.createElement('div');
    d.className=`toast-msg toast-${type}`;d.textContent=msg;
    c.appendChild(d);setTimeout(()=>d.remove(),4000);
  }

  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  showView('dashboard', document.querySelector('[data-view="dashboard"]'));
</script>
</body>
